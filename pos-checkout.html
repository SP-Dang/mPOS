<!DOCTYPE html>
<html lang="lo">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mPOS | ຂາຍສິນຄ້າ</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Phetsarath:wght@400;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #10b981;
            --sidebar: #0f172a;
            --bg: #f8fafc;
            --text: #1e293b;
            --border: #e2e8f0;
            --lao: 'Phetsarath', sans-serif;
        }
        body {
            margin: 0;
            display: flex;
            background: var(--bg);
            font-family: 'Plus Jakarta Sans', var(--lao);
            height: 100vh;
            overflow: hidden;
        }
        .sidebar {
            width: 260px;
            background: var(--sidebar);
            color: white;
            display: flex;
            flex-direction: column;
        }
        .logo {
            padding: 24px 20px;
            font-size: 22px;
            font-weight: 800;
            color: var(--primary);
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .nav-menu { flex: 1; padding: 20px; }
        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            color: #94a3b8;
            text-decoration: none;
            border-radius: 12px;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 14px;
        }
        .nav-item:hover { background: rgba(255,255,255,0.05); color: white; }
        .nav-item.active { background: var(--primary); color: white; }
        .admin-only { display: flex; }
        .user-info { padding: 20px; border-top: 1px solid rgba(255,255,255,0.1); }
        .user-name { font-weight: 600; margin-bottom: 10px; font-size: 13px; }
        .logout-btn {
            background: rgba(239, 68, 68, 0.2);
            color: #f87171;
            border: none;
            width: 100%;
            padding: 10px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            text-align: left;
        }
        .checkout-container { flex: 1; display: flex; overflow: hidden; }
        .cart-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            padding: 20px;
        }
        .cart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .cart-header h1 { font-size: 24px; color: var(--text); }
        .barcode-input { display: flex; gap: 10px; }
        .barcode-input input {
            padding: 12px 16px;
            border: 2px solid var(--border);
            border-radius: 12px;
            font-size: 16px;
            width: 280px;
            outline: none;
            font-family: monospace;
        }
        .barcode-input input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(16,185,129,0.1);
        }
        .barcode-input button {
            padding: 12px 20px;
            background: var(--sidebar);
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
        }
        .cart-table-container {
            flex: 1;
            overflow-y: auto;
            background: white;
            border-radius: 20px;
            border: 1px solid var(--border);
        }
        .cart-table { width: 100%; border-collapse: collapse; }
        .cart-table th {
            padding: 15px;
            text-align: left;
            background: #f8fafc;
            font-size: 12px;
            font-weight: 700;
            color: #64748b;
            border-bottom: 1px solid var(--border);
        }
        .cart-table td { padding: 12px 15px; border-bottom: 1px solid var(--border); }
        .item-name { font-weight: 700; font-size: 14px; }
        .item-barcode { font-size: 10px; color: #64748b; font-family: monospace; }
        .qty-control { display: flex; align-items: center; gap: 8px; }
        .qty-btn {
            width: 28px;
            height: 28px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: white;
            cursor: pointer;
            font-weight: bold;
        }
        .remove-btn {
            background: none;
            border: none;
            color: #ef4444;
            cursor: pointer;
            font-size: 18px;
        }
        .summary-section {
            width: 360px;
            background: white;
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 20px;
        }
        .loyalty-box {
            background: #d1fae5;
            border-radius: 16px;
            padding: 15px;
            margin-bottom: 20px;
        }
        .loyalty-box label { font-size: 12px; font-weight: 700; color: #065f46; display: block; margin-bottom: 8px; }
        .loyalty-input {
            width: 100%;
            padding: 10px;
            border: 2px solid transparent;
            border-radius: 10px;
            outline: none;
            font-size: 14px;
        }
        .customer-info {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px dashed #10b981;
            font-size: 13px;
        }
        .payment-methods {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }
        .pay-btn {
            padding: 14px;
            border: 2px solid var(--border);
            border-radius: 12px;
            background: white;
            cursor: pointer;
            font-weight: 700;
        }
        .pay-btn.active {
            border-color: var(--primary);
            background: #d1fae5;
            color: #059669;
        }
        .total-card {
            background: var(--sidebar);
            border-radius: 20px;
            padding: 20px;
            color: white;
            margin-bottom: 20px;
        }
        .total-row { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 14px; }
        .grand-total { font-size: 24px; font-weight: 800; margin-top: 10px; padding-top: 10px; border-top: 1px solid rgba(255,255,255,0.2); }
        .action-buttons { display: flex; gap: 10px; margin-bottom: 10px; }
        .btn-clear { flex: 1; background: #ef4444; color: white; border: none; padding: 14px; border-radius: 12px; font-weight: 700; cursor: pointer; }
        .btn-complete { width: 100%; background: #10b981; color: white; border: none; padding: 16px; border-radius: 12px; font-weight: 800; font-size: 16px; cursor: pointer; }
        .empty-cart { text-align: center; padding: 60px; color: #64748b; }
        
        /* Receipt Print */
        @media print {
            body * { visibility: hidden; }
            .receipt-print, .receipt-print * { visibility: visible; }
            .receipt-print {
                position: absolute;
                left: 0;
                top: 0;
                width: 72mm;
                padding: 3mm;
                font-family: monospace;
                font-size: 11px;
            }
            @page { size: 72mm auto; margin: 0mm; }
        }
    </style>
</head>
<body>

<nav class="sidebar">
    <div class="logo"><span>⚡</span> mPOS</div>
    <div class="nav-menu">
        <a href="index.html" class="nav-item admin-only">📊 Dashboard</a>
        <a href="pos-checkout.html" class="nav-item active">🛒 ຂາຍສິນຄ້າ</a>
        <a href="pos-inventory.html" class="nav-item admin-only">📦 ຄັງສິນຄ້າ</a>
        <a href="pos-customers.html" class="nav-item">👥 ລູກຄ້າ</a>
        <a href="pos-reports.html" class="nav-item admin-only">📊 ລາຍງານ</a>
    </div>
    <div class="user-info">
        <div class="user-name" id="user-name-display">ກຳລັງໂຫຼດ...</div>
        <button class="logout-btn" onclick="handleLogout()">🚪 ອອກຈາກລະບົບ</button>
    </div>
</nav>

<div class="checkout-container">
    <div class="cart-section">
        <div class="cart-header">
            <h1>🛒 ລາຍການສິນຄ້າ</h1>
            <div class="barcode-input">
                <input type="text" id="barcode-input" placeholder="ສະແກນ ຫຼື ປ້ອນບາໂຄດ..." autofocus>
                <button onclick="manualSearch()">🔍 ຄົ້ນຫາ</button>
            </div>
        </div>
        
        <div class="cart-table-container">
            <table class="cart-table">
                <thead><tr><th>ສິນຄ້າ</th><th>ລາຄາ</th><th>ຈຳນວນ</th><th>ລວມ</th><th></th></tr></thead>
                <tbody id="cart-body">
                    <tr><td colspan="5" class="empty-cart">🛍️ ຍັງບໍ່ມີສິນຄ້າ<br>ກະລຸນາສະແກນບາໂຄດ</td></tr>
                </tbody>
            </table>
        </div>
    </div>
    
    <div class="summary-section">
        <div class="loyalty-box">
            <label>👤 ສະມາຊິກ (ເບີໂທ)</label>
            <input type="text" id="customer-phone" class="loyalty-input" placeholder="020xxxxxxxx">
            <div id="customer-info" style="display: none;" class="customer-info">
                <div id="customer-name"></div>
                <div>⭐ ຄະແນນ: <span id="customer-points">0</span></div>
                <button onclick="applyPoints()" style="margin-top: 8px; padding: 5px 10px; background: #10b981; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 11px;">ໃຊ້ຄະແນນ</button>
            </div>
        </div>
        
        <div class="payment-methods">
            <button class="pay-btn active" onclick="setPaymentMethod('Cash', this)">💵 ເງິນສົດ</button>
            <button class="pay-btn" onclick="setPaymentMethod('QR Code', this)">📱 QR Code</button>
        </div>
        
        <div class="total-card">
            <div class="total-row"><span>ຍອດຍ່ອຍ</span><span id="subtotal-display">₭0</span></div>
            <div class="total-row"><span>ອາກອນ (7%)</span><span id="tax-display">₭0</span></div>
            <div class="total-row" id="discount-row" style="display: none;"><span>ສ່ວນຫຼຸດ</span><span id="discount-display">₭0</span></div>
            <div class="grand-total"><div>ຍອດລວມທັງໝົດ</div><div id="grand-total">₭0</div></div>
        </div>
        
        <div class="action-buttons">
            <button class="btn-clear" onclick="clearCart()">🗑️ ລຶບທັງໝົດ</button>
        </div>
        <button class="btn-complete" onclick="processSale()">✅ ສຳເລັດການຂາຍ</button>

<!-- PAGE-SPECIFIC CODE -->
<script>
// =====================================================
// POS CHECKOUT - PAGE SPECIFIC CODE
// =====================================================

// State
let cart = [];
let selectedCustomer = null;
let paymentMethod = "Cash";
let appliedPoints = 0;
let currentDiscount = 0;

// Calculate totals (uses shared calculateCartTotals)
function calculateTotals() {
    return calculateCartTotals(cart, window.TAX_RATE);
}

function updateDisplay() {
    const { subtotal, tax, total } = calculateTotals();
    const finalTotal = total - currentDiscount;
    
    document.getElementById('subtotal-display').innerHTML = formatLAK(subtotal);
    document.getElementById('tax-display').innerHTML = formatLAK(tax);
    document.getElementById('grand-total').innerHTML = formatLAK(finalTotal);
    
    if (currentDiscount > 0) {
        document.getElementById('discount-row').style.display = 'flex';
        document.getElementById('discount-display').innerHTML = `-${formatLAK(currentDiscount)}`;
    } else {
        document.getElementById('discount-row').style.display = 'none';
    }
}

function drawCart() {
    const tbody = document.getElementById('cart-body');
    if (!tbody) return;
    
    if (cart.length === 0) {
        tbody.innerHTML = '<tr><td colspan="5" class="empty-cart">🛍️ ຍັງບໍ່ມີສິນຄ້າ<br>ກະລຸນາສະແກນບາໂຄດ</td></tr>';
        updateDisplay();
        return;
    }
    
    tbody.innerHTML = cart.map((item, idx) => `
        <tr>
            <td><div class="item-name">${item.name}</div><div class="item-barcode">${item.barcode}</div></td>
            <td>${formatLAK(item.retail_price)}</td>
            <td><div class="qty-control"><button class="qty-btn" onclick="adjustQuantity(${idx}, -1)">-</button><span>${item.qty}</span><button class="qty-btn" onclick="adjustQuantity(${idx}, 1)">+</button></div></td>
            <td>${formatLAK(item.retail_price * item.qty)}</td>
            <td><button class="remove-btn" onclick="removeItem(${idx})">🗑️</button></td>
        </tr>
    `).join('');
    updateDisplay();
}

function adjustQuantity(idx, delta) {
    const newQty = cart[idx].qty + delta;
    if (newQty < 1) {
        cart.splice(idx, 1);
    } else {
        cart[idx].qty = newQty;
    }
    drawCart();
}

function removeItem(idx) {
    cart.splice(idx, 1);
    drawCart();
}

function clearCart() {
    if (cart.length === 0) return;
    if (confirm('ລຶບສິນຄ້າທັງໝົດ?')) {
        cart = [];
        appliedPoints = 0;
        currentDiscount = 0;
        drawCart();
        showToast('ລຶບສຳເລັດ', 'info');
    }
}

async function searchProduct(barcode) {
    if (!barcode.trim()) return;
    
    try {
        const { data, error } = await window.supabaseClient
            .from('pos_products')
            .select('*')
            .eq('barcode', barcode.trim())
            .single();
        
        if (error || !data) {
            showToast('ບໍ່ພົບສິນຄ້າ!', 'error');
            return;
        }
        
        const existing = cart.find(i => i.barcode === data.barcode);
        if (existing) {
            existing.qty++;
        } else {
            cart.push({ ...data, qty: 1 });
        }
        drawCart();
        showToast(`ເພີ່ມ ${data.name} ສຳເລັດ`, 'success');
    } catch (err) {
        console.error(err);
        showToast('ເກີດຂໍ້ຜິດພາດ', 'error');
    }
}

function manualSearch() {
    const barcode = prompt('ປ້ອນບາໂຄດ:');
    if (barcode) {
        searchProduct(barcode);
        document.getElementById('barcode-input').value = '';
        document.getElementById('barcode-input').focus();
    }
}

async function searchCustomer() {
    const phone = document.getElementById('customer-phone')?.value.trim();
    if (!phone || phone.length < 10) {
        document.getElementById('customer-info').style.display = 'none';
        selectedCustomer = null;
        return;
    }
    
    try {
        const { data } = await window.supabaseClient
            .from('pos_customers')
            .select('*')
            .eq('phone', phone)
            .single();
        
        if (data) {
            selectedCustomer = data;
            document.getElementById('customer-name').innerHTML = `👤 ${data.name}`;
            document.getElementById('customer-points').innerText = data.points || 0;
            document.getElementById('customer-info').style.display = 'block';
        } else {
            selectedCustomer = null;
            document.getElementById('customer-info').style.display = 'none';
        }
    } catch (err) {
        selectedCustomer = null;
        document.getElementById('customer-info').style.display = 'none';
    }
}

function setPaymentMethod(method, btn) {
    paymentMethod = method;
    document.querySelectorAll('.pay-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
}

async function applyPoints() {
    if (!selectedCustomer) {
        showToast('ກະລຸນາເລືອກລູກຄ້າກ່ອນ', 'warning');
        return;
    }
    
    const { subtotal, tax } = calculateTotals();
    const maxPointsValue = Math.floor((subtotal + tax) / 1000);
    const availablePoints = Math.min(selectedCustomer.points, maxPointsValue);
    
    if (availablePoints <= 0) {
        showToast('ຄະແນນບໍ່ພຽງພໍ', 'warning');
        return;
    }
    
    const pointsToUse = prompt(`ມີ ${selectedCustomer.points} ຄະແນນ. ໃຊ້ຈັກຄະແນນ? (ສູງສຸດ ${availablePoints})`, availablePoints);
    
    if (pointsToUse && !isNaN(pointsToUse) && pointsToUse > 0) {
        appliedPoints = Math.min(parseInt(pointsToUse), availablePoints);
        currentDiscount = appliedPoints * 1000;
        updateDisplay();
        showToast(`ໃຊ້ ${appliedPoints} ຄະແນນ, ຫຼຸດ ${formatLAK(currentDiscount)}`, 'success');
    }
}

function printReceipt(orderId, total, pointsEarned) {
    const now = new Date();
    const shortId = orderId.substring(0, 8).toUpperCase();
    
    document.getElementById('receipt-datetime').innerHTML = now.toLocaleString('lo-LA');
    document.getElementById('receipt-order-id').innerHTML = shortId;
    
    let customerHtml = '';
    if (selectedCustomer) {
        customerHtml = `<div>${selectedCustomer.name}</div><div>${selectedCustomer.phone}</div>`;
    }
    document.getElementById('receipt-customer-info').innerHTML = customerHtml;
    
    const itemsHtml = cart.map(item => `
        <div style="display: flex; justify-content: space-between;">
            <span>${item.name} x${item.qty}</span>
            <span>${formatLAK(item.retail_price * item.qty)}</span>
        </div>
    `).join('');
    document.getElementById('receipt-items-list').innerHTML = itemsHtml;
    
    const { subtotal, tax } = calculateTotals();
    const finalTotal = subtotal + tax - currentDiscount;
    
    document.getElementById('receipt-totals').innerHTML = `
        <div style="display: flex; justify-content: space-between;"><span>ຍອດຍ່ອຍ:</span><span>${formatLAK(subtotal)}</span></div>
        <div style="display: flex; justify-content: space-between;"><span>ອາກອນ (7%):</span><span>${formatLAK(tax)}</span></div>
        ${currentDiscount > 0 ? `<div style="display: flex; justify-content: space-between;"><span>ສ່ວນຫຼຸດ:</span><span>-${formatLAK(currentDiscount)}</span></div>` : ''}
        <div style="display: flex; justify-content: space-between; font-weight: bold; border-top: 1px dashed #000; padding-top: 5px;"><span>ລວມ:</span><span>${formatLAK(finalTotal)}</span></div>
        <div style="display: flex; justify-content: space-between;"><span>ຊຳລະ:</span><span>${paymentMethod}</span></div>
    `;
    
    let pointsHtml = '';
    if (selectedCustomer) {
        pointsHtml = `<div>⭐ ຄະແນນທີ່ໄດ້: +${pointsEarned}</div>
                      <div>⭐ ຄະແນນທັງໝົດ: ${(selectedCustomer.points || 0) + pointsEarned - appliedPoints}</div>`;
    }
    document.getElementById('receipt-points-info').innerHTML = pointsHtml;
    
    JsBarcode("#receipt-barcode", shortId, { format: "CODE128", width: 1.5, height: 35, displayValue: true });
    
    setTimeout(() => {
        const content = document.querySelector('.receipt-print').cloneNode(true);
        const win = window.open('', '_blank');
        win.document.write(`<!DOCTYPE html><html><head><title>ໃບຮັບເງິນ</title><style>@page{size:80mm;margin:0}body{font-family:monospace;font-size:12px;width:80mm;margin:0;padding:8px}</style></head><body>${content.outerHTML}</body></html>`);
        win.print();
        win.close();
    }, 100);
}

async function processSale() {
    if (cart.length === 0) {
        showToast('ກະລຸນາເພີ່ມສິນຄ້າ', 'warning');
        return;
    }
    
    const btn = document.querySelector('.btn-complete');
    btn.disabled = true;
    btn.innerHTML = '⏳ ກຳລັງດຳເນີນການ...';
    
    try {
        const { subtotal, tax, total } = calculateTotals();
        const finalTotal = total - currentDiscount;
        const cashierName = getCurrentUser().name || 'Cashier';
        const pointsEarned = Math.floor(finalTotal / 10000);
        const invoiceNumber = generateInvoiceNumber();
        
        if (paymentMethod === 'Cash') {
            const received = prompt(`ຍອດລວມ: ${formatLAK(finalTotal)}\nເງິນທີ່ໃຫ້ມາ:`, Math.ceil(finalTotal / 1000) * 1000);
            if (!received) {
                btn.disabled = false;
                btn.innerHTML = '✅ ສຳເລັດການຂາຍ';
                return;
            }
            const change = parseFloat(received) - finalTotal;
            if (change < 0) {
                showToast('ເງິນບໍ່ພໍ!', 'error');
                btn.disabled = false;
                btn.innerHTML = '✅ ສຳເລັດການຂາຍ';
                return;
            }
            if (change > 0) alert(`ເງິນທອນ: ${formatLAK(change)}`);
        }
        
        // Update inventory
        for (const item of cart) {
            const { data: product } = await window.supabaseClient
                .from('pos_products')
                .select('stock_qty')
                .eq('barcode', item.barcode)
                .single();
            
            if (product && product.stock_qty >= item.qty) {
                await window.supabaseClient
                    .from('pos_products')
                    .update({ stock_qty: product.stock_qty - item.qty })
                    .eq('barcode', item.barcode);
            }
        }
        
        // Save sale
        const { data, error } = await window.supabaseClient
            .from('pos_sales')
            .insert([{
                invoice_number: invoiceNumber,
                items: cart,
                subtotal: subtotal,
                tax_amount: tax,
                discount_amount: currentDiscount,
                total_amount: finalTotal,
                payment_method: paymentMethod,
                status: 'COMPLETED',
                cashier_name: cashierName,
                customer_phone: selectedCustomer?.phone || null,
                points_earned: pointsEarned,
                points_redeemed: appliedPoints
            }])
            .select();
        
        if (error) throw error;
        
        // Update customer points
        if (selectedCustomer) {
            const newPoints = (selectedCustomer.points || 0) + pointsEarned - appliedPoints;
            await window.supabaseClient
                .from('pos_customers')
                .update({ 
                    points: newPoints,
                    total_spent: (selectedCustomer.total_spent || 0) + finalTotal
                })
                .eq('phone', selectedCustomer.phone);
        }
        
        printReceipt(data[0].id, finalTotal, pointsEarned);
        
        cart = [];
        selectedCustomer = null;
        appliedPoints = 0;
        currentDiscount = 0;
        document.getElementById('customer-phone').value = '';
        document.getElementById('customer-info').style.display = 'none';
        drawCart();
        
        showToast(`ຊຳລະສຳເລັດ! ${formatLAK(finalTotal)}`, 'success');
        
    } catch (err) {
        console.error(err);
        showToast('ເກີດຂໍ້ຜິດພາດ: ' + err.message, 'error');
    } finally {
        btn.disabled = false;
        btn.innerHTML = '✅ ສຳເລັດການຂາຍ';
        document.getElementById('barcode-input').focus();
    }
}

// Event listeners
document.getElementById('barcode-input').addEventListener('keypress', (e) => {
    if (e.key === 'Enter') {
        searchProduct(e.target.value);
        e.target.value = '';
    }
});

document.getElementById('customer-phone').addEventListener('input', searchCustomer);

// Initialize
function init() {
    if (!checkAuth()) return;
    displayUserName();
    setupRoleBasedMenus();
    drawCart();
    document.getElementById('barcode-input').focus();
}

init();
</script>
</body>
</html>
