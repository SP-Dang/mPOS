<!DOCTYPE html>
<html lang="lo">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mPOS | ຂາຍສິນຄ້າ</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Phetsarath:wght@400;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #10b981;
            --sidebar: #0f172a;
            --bg: #f8fafc;
            --text: #1e293b;
            --border: #e2e8f0;
            --lao: 'Phetsarath', sans-serif;
        }
        body {
            margin: 0;
            display: flex;
            background: var(--bg);
            font-family: 'Plus Jakarta Sans', var(--lao);
            height: 100vh;
            overflow: hidden;
        }
        .sidebar {
            width: 260px;
            background: var(--sidebar);
            color: white;
            display: flex;
            flex-direction: column;
        }
        .logo {
            padding: 24px 20px;
            font-size: 22px;
            font-weight: 800;
            color: var(--primary);
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .nav-menu { flex: 1; padding: 20px; }
        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            color: #94a3b8;
            text-decoration: none;
            border-radius: 12px;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 14px;
        }
        .nav-item:hover { background: rgba(255,255,255,0.05); color: white; }
        .nav-item.active { background: var(--primary); color: white; }
        .user-info { padding: 20px; border-top: 1px solid rgba(255,255,255,0.1); }
        .user-name { font-weight: 600; margin-bottom: 10px; font-size: 13px; }
        .logout-btn {
            background: rgba(239, 68, 68, 0.2);
            color: #f87171;
            border: none;
            width: 100%;
            padding: 10px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            text-align: left;
        }
        .checkout-container { flex: 1; display: flex; overflow: hidden; }
        .cart-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            padding: 20px;
        }
        .cart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .cart-header h1 { font-size: 24px; color: var(--text); }
        .barcode-input { display: flex; gap: 10px; }
        .barcode-input input {
            padding: 12px 16px;
            border: 2px solid var(--border);
            border-radius: 12px;
            font-size: 16px;
            width: 280px;
            outline: none;
            font-family: monospace;
        }
        .barcode-input input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(16,185,129,0.1);
        }
        .barcode-input button {
            padding: 12px 20px;
            background: var(--sidebar);
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
        }
        .cart-table-container {
            flex: 1;
            overflow-y: auto;
            background: white;
            border-radius: 20px;
            border: 1px solid var(--border);
        }
        .cart-table { width: 100%; border-collapse: collapse; }
        .cart-table th {
            padding: 15px;
            text-align: left;
            background: #f8fafc;
            font-size: 12px;
            font-weight: 700;
            color: #64748b;
            border-bottom: 1px solid var(--border);
        }
        .cart-table td { padding: 12px 15px; border-bottom: 1px solid var(--border); }
        .item-name { font-weight: 700; font-size: 14px; }
        .item-barcode { font-size: 10px; color: #64748b; font-family: monospace; }
        .qty-control { display: flex; align-items: center; gap: 8px; }
        .qty-btn {
            width: 28px;
            height: 28px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: white;
            cursor: pointer;
            font-weight: bold;
        }
        .remove-btn {
            background: none;
            border: none;
            color: #ef4444;
            cursor: pointer;
            font-size: 18px;
        }
        .summary-section {
            width: 360px;
            background: white;
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 20px;
        }
        .loyalty-box {
            background: #d1fae5;
            border-radius: 16px;
            padding: 15px;
            margin-bottom: 20px;
        }
        .loyalty-box label { font-size: 12px; font-weight: 700; color: #065f46; display: block; margin-bottom: 8px; }
        .loyalty-input {
            width: 100%;
            padding: 10px;
            border: 2px solid transparent;
            border-radius: 10px;
            outline: none;
            font-size: 14px;
        }
        .customer-info {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px dashed #10b981;
            font-size: 13px;
        }
        .payment-methods {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }
        .pay-btn {
            padding: 14px;
            border: 2px solid var(--border);
            border-radius: 12px;
            background: white;
            cursor: pointer;
            font-weight: 700;
        }
        .pay-btn.active {
            border-color: var(--primary);
            background: #d1fae5;
            color: #059669;
        }
        .total-card {
            background: var(--sidebar);
            border-radius: 20px;
            padding: 20px;
            color: white;
            margin-bottom: 20px;
        }
        .total-row { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 14px; }
        .grand-total { font-size: 24px; font-weight: 800; margin-top: 10px; padding-top: 10px; border-top: 1px solid rgba(255,255,255,0.2); }
        .action-buttons { display: flex; gap: 10px; margin-bottom: 10px; }
        .btn-clear { flex: 1; background: #ef4444; color: white; border: none; padding: 14px; border-radius: 12px; font-weight: 700; cursor: pointer; }
        .btn-complete { width: 100%; background: #10b981; color: white; border: none; padding: 16px; border-radius: 12px; font-weight: 800; font-size: 16px; cursor: pointer; }
        .empty-cart { text-align: center; padding: 60px; color: #64748b; }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        @keyframes slideOut {
            from { transform: translateX(0); opacity: 1; }
            to { transform: translateX(100%); opacity: 0; }
        }
        .toast {
            position: fixed; bottom: 20px; right: 20px; padding: 12px 20px;
            border-radius: 12px; color: white; font-weight: bold; z-index: 10000;
            animation: slideIn 0.3s ease;
        }
        .toast-success { background: #10b981; }
        .toast-error { background: #ef4444; }
        .toast-warning { background: #f59e0b; }
    </style>
</head>
<body>

<nav class="sidebar">
    <div class="logo"><span>⚡</span> mPOS</div>
    <div class="nav-menu">
        <a href="#" class="nav-item active">🛒 ຂາຍສິນຄ້າ</a>
    </div>
    <div class="user-info">
        <div class="user-name" id="user-name-display">ກຳລັງໂຫຼດ...</div>
        <button class="logout-btn" onclick="logout()">🚪 ອອກຈາກລະບົບ</button>
    </div>
</nav>

<div class="checkout-container">
    <div class="cart-section">
        <div class="cart-header">
            <h1>🛒 ລາຍການສິນຄ້າ</h1>
            <div class="barcode-input">
                <input type="text" id="barcode-input" placeholder="ສະແກນ ຫຼື ປ້ອນບາໂຄດ..." autofocus>
                <button onclick="manualSearch()">🔍 ຄົ້ນຫາ</button>
            </div>
        </div>
        
        <div class="cart-table-container">
            <table class="cart-table">
                <thead><tr><th>ສິນຄ້າ</th><th>ລາຄາ</th><th>ຈຳນວນ</th><th>ລວມ</th><th></th></tr></thead>
                <tbody id="cart-body">
                    <tr><td colspan="5" class="empty-cart">🛍️ ຍັງບໍ່ມີສິນຄ້າ<br>ກະລຸນາສະແກນບາໂຄດ</td></tr>
                </tbody>
            </table>
        </div>
    </div>
    
    <div class="summary-section">
        <div class="loyalty-box">
            <label>👤 ສະມາຊິກ (ເບີໂທ)</label>
            <input type="text" id="customer-phone" class="loyalty-input" placeholder="020xxxxxxxx">
            <div id="customer-info" style="display: none;" class="customer-info">
                <div id="customer-name"></div>
                <div>⭐ ຄະແນນ: <span id="customer-points">0</span></div>
                <button onclick="applyPoints()" style="margin-top: 8px; padding: 5px 10px; background: #10b981; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 11px;">ໃຊ້ຄະແນນ</button>
            </div>
        </div>
        
        <div class="payment-methods">
            <button class="pay-btn active" onclick="setPaymentMethod('Cash', this)">💵 ເງິນສົດ</button>
            <button class="pay-btn" onclick="setPaymentMethod('QR Code', this)">📱 QR Code</button>
        </div>
        
        <div class="total-card">
            <div class="total-row"><span>ຍອດຍ່ອຍ</span><span id="subtotal-display">₭0</span></div>
            <div class="total-row"><span>ອາກອນ (7%)</span><span id="tax-display">₭0</span></div>
            <div class="total-row" id="discount-row" style="display: none;"><span>ສ່ວນຫຼຸດ</span><span id="discount-display">₭0</span></div>
            <div class="grand-total"><div>ຍອດລວມທັງໝົດ</div><div id="grand-total">₭0</div></div>
        </div>
        
        <div class="action-buttons">
            <button class="btn-clear" onclick="clearCart()">🗑️ ລຶບທັງໝົດ</button>
        </div>
        <button class="btn-complete" onclick="processSale()">✅ ສຳເລັດການຂາຍ</button>
    </div>
</div>

<script>
// =====================================================
// POS CHECKOUT - COMPLETE WORKING VERSION
// =====================================================

// Supabase client
const _supabase = supabase.createClient(
    "https://rcjvgyetkukyaexzskmg.supabase.co",
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJjanZneWV0a3VreWFleHpza21nIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc4NzQ2MzUsImV4cCI6MjA5MzQ1MDYzNX0.aNTyK0l1sOYpZ0TdGrmjxIQbafnujQb1hP6dENX_104"
);

// STATE VARIABLES
let cart = [];
let selectedCustomer = null;
let paymentMethod = "Cash";
let appliedPoints = 0;      // ← ADDED
let currentDiscount = 0;    // ← ADDED

// Helper functions
function formatLAK(amount) {
    if (isNaN(amount)) return '₭0';
    return new Intl.NumberFormat('lo-LA').format(Math.round(amount)) + ' ₭';
}

function showToast(message, type = 'success') {
    const existing = document.querySelector('.toast');
    if (existing) existing.remove();
    const toast = document.createElement('div');
    toast.className = `toast toast-${type}`;
    toast.textContent = message;
    document.body.appendChild(toast);
    setTimeout(() => {
        toast.style.animation = 'slideOut 0.3s ease';
        setTimeout(() => toast.remove(), 300);
    }, 3000);
}

function logout() {
    localStorage.clear();
    window.location.href = 'login.html';
}

// Calculate totals including discount
function calculateTotals() {
    const subtotal = cart.reduce((sum, item) => sum + (item.retail_price * item.qty), 0);
    const tax = subtotal * 0.07;
    const total = subtotal + tax - currentDiscount;
    return { subtotal, tax, total };
}

function updateDisplay() {
    const { subtotal, tax, total } = calculateTotals();
    document.getElementById('subtotal-display').innerHTML = formatLAK(subtotal);
    document.getElementById('tax-display').innerHTML = formatLAK(tax);
    document.getElementById('grand-total').innerHTML = formatLAK(total);
    
    if (currentDiscount > 0) {
        document.getElementById('discount-row').style.display = 'flex';
        document.getElementById('discount-display').innerHTML = `-${formatLAK(currentDiscount)}`;
    } else {
        document.getElementById('discount-row').style.display = 'none';
    }
}

function drawCart() {
    const tbody = document.getElementById('cart-body');
    if (!tbody) return;
    
    if (cart.length === 0) {
        tbody.innerHTML = '<tr><td colspan="5" class="empty-cart">🛍️ ຍັງບໍ່ມີສິນຄ້າ<br>ກະລຸນາສະແກນບາໂຄດ</td></tr>';
        updateDisplay();
        return;
    }
    
    tbody.innerHTML = cart.map((item, idx) => `
        <tr>
            <td><div class="item-name">${item.name}</div><div class="item-barcode">${item.barcode}</div></td>
            <td>${formatLAK(item.retail_price)}</td>
            <td><div class="qty-control"><button class="qty-btn" onclick="adjustQuantity(${idx}, -1)">-</button><span>${item.qty}</span><button class="qty-btn" onclick="adjustQuantity(${idx}, 1)">+</button></div></td>
            <td>${formatLAK(item.retail_price * item.qty)}</td>
            <td><button class="remove-btn" onclick="removeItem(${idx})">🗑️</button></td>
        </tr>
    `).join('');
    updateDisplay();
}

function adjustQuantity(idx, delta) {
    const newQty = cart[idx].qty + delta;
    if (newQty < 1) {
        cart.splice(idx, 1);
    } else {
        cart[idx].qty = newQty;
    }
    drawCart();
}

function removeItem(idx) {
    cart.splice(idx, 1);
    drawCart();
}

function clearCart() {
    if (cart.length === 0) return;
    if (confirm('ລຶບສິນຄ້າທັງໝົດ?')) {
        cart = [];
        appliedPoints = 0;
        currentDiscount = 0;
        drawCart();
        showToast('ລຶບສຳເລັດ', 'info');
    }
}

async function searchProduct(barcode) {
    if (!barcode.trim()) return;
    
    try {
        const { data, error } = await _supabase
            .from('pos_products')
            .select('*')
            .eq('barcode', barcode.trim())
            .single();
        
        if (error || !data) {
            showToast('ບໍ່ພົບສິນຄ້າ!', 'error');
            return;
        }
        
        const existing = cart.find(i => i.barcode === data.barcode);
        if (existing) {
            existing.qty++;
        } else {
            cart.push({ ...data, qty: 1 });
        }
        drawCart();
        showToast(`ເພີ່ມ ${data.name} ສຳເລັດ`, 'success');
    } catch (err) {
        console.error(err);
        showToast('ເກີດຂໍ້ຜິດພາດ', 'error');
    }
}

function manualSearch() {
    const barcode = prompt('ປ້ອນບາໂຄດ:');
    if (barcode) {
        searchProduct(barcode);
        document.getElementById('barcode-input').value = '';
        document.getElementById('barcode-input').focus();
    }
}

async function searchCustomer() {
    const phone = document.getElementById('customer-phone')?.value.trim();
    if (!phone || phone.length < 10) {
        document.getElementById('customer-info').style.display = 'none';
        selectedCustomer = null;
        return;
    }
    
    try {
        const { data } = await _supabase
            .from('pos_customers')
            .select('*')
            .eq('phone', phone)
            .single();
        
        if (data) {
            selectedCustomer = data;
            document.getElementById('customer-name').innerHTML = `👤 ${data.name}`;
            document.getElementById('customer-points').innerText = data.points || 0;
            document.getElementById('customer-info').style.display = 'block';
        } else {
            selectedCustomer = null;
            document.getElementById('customer-info').style.display = 'none';
        }
    } catch (err) {
        selectedCustomer = null;
        document.getElementById('customer-info').style.display = 'none';
    }
}

function setPaymentMethod(method, btn) {
    paymentMethod = method;
    document.querySelectorAll('.pay-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
}

// Apply loyalty points
async function applyPoints() {
    if (!selectedCustomer) {
        showToast('ກະລຸນາເລືອກລູກຄ້າກ່ອນ', 'warning');
        return;
    }
    
    const { subtotal, tax } = calculateTotals();
    const pointsValue = 1000;
    const maxPointsValue = Math.floor((subtotal + tax) / pointsValue);
    const availablePoints = Math.min(selectedCustomer.points, maxPointsValue);
    
    if (availablePoints <= 0) {
        showToast('ຄະແນນບໍ່ພຽງພໍ', 'warning');
        return;
    }
    
    const pointsToUse = prompt(`ມີ ${selectedCustomer.points} ຄະແນນ. ໃຊ້ຈັກຄະແນນ? (ສູງສຸດ ${availablePoints})`, availablePoints);
    
    if (pointsToUse && !isNaN(pointsToUse) && pointsToUse > 0) {
        appliedPoints = Math.min(parseInt(pointsToUse), availablePoints);
        currentDiscount = appliedPoints * pointsValue;
        updateDisplay();
        showToast(`ໃຊ້ ${appliedPoints} ຄະແນນ, ຫຼຸດ ${formatLAK(currentDiscount)}`, 'success');
    }
}

// Process sale
async function processSale() {
    if (cart.length === 0) {
        showToast('ກະລຸນາເພີ່ມສິນຄ້າ', 'warning');
        return;
    }
    
    const btn = document.querySelector('.btn-complete');
    btn.disabled = true;
    btn.innerHTML = '⏳ ກຳລັງດຳເນີນການ...';
    
    try {
        const { subtotal, tax, total } = calculateTotals();
        const cashierName = localStorage.getItem('lsm_user_name') || 'Cashier';
        const pointsEarned = Math.floor(total / 10000);
        
        // Generate invoice number
        const today = new Date();
        const dateStr = today.getFullYear().toString().slice(-2) + 
                       (today.getMonth() + 1).toString().padStart(2, '0') + 
                       today.getDate().toString().padStart(2, '0');
        const randomNum = Math.floor(Math.random() * 10000).toString().padStart(4, '0');
        const invoiceNumber = `INV-${dateStr}-${randomNum}`;
        
        if (paymentMethod === 'Cash') {
            const received = prompt(`ຍອດລວມ: ${formatLAK(total)}\nເງິນທີ່ໃຫ້ມາ:`, Math.ceil(total / 1000) * 1000);
            if (!received) {
                btn.disabled = false;
                btn.innerHTML = '✅ ສຳເລັດການຂາຍ';
                return;
            }
            const change = parseFloat(received) - total;
            if (change < 0) {
                showToast('ເງິນບໍ່ພໍ!', 'error');
                btn.disabled = false;
                btn.innerHTML = '✅ ສຳເລັດການຂາຍ';
                return;
            }
            if (change > 0) alert(`ເງິນທອນ: ${formatLAK(change)}`);
        }
        
        // Update inventory
        for (const item of cart) {
            const { data: product } = await _supabase
                .from('pos_products')
                .select('stock_qty')
                .eq('barcode', item.barcode)
                .single();
            
            if (product) {
                const newStock = product.stock_qty - item.qty;
                if (newStock >= 0) {
                    await _supabase
                        .from('pos_products')
                        .update({ stock_qty: newStock })
                        .eq('barcode', item.barcode);
                }
            }
        }
        
        // Prepare sale record with ALL required columns
        const saleRecord = {
            invoice_number: invoiceNumber,
            items: cart,
            subtotal: subtotal,
            tax_amount: tax,
            discount_amount: currentDiscount,
            total_amount: total,
            payment_method: paymentMethod,
            status: 'COMPLETED',
            cashier_name: cashierName,
            customer_phone: selectedCustomer?.phone || null,
            points_earned: pointsEarned,
            points_redeemed: appliedPoints
        };
        
        console.log('Saving sale:', saleRecord);
        
        const { data, error } = await _supabase
            .from('pos_sales')
            .insert([saleRecord])
            .select();
        
        if (error) {
            console.error('Save error:', error);
            showToast(`ບັນທຶກບໍ່ສຳເລັດ: ${error.message}`, 'error');
            throw error;
        }
        
        // Update customer points
        if (selectedCustomer) {
            const newPoints = (selectedCustomer.points || 0) + pointsEarned - appliedPoints;
            await _supabase
                .from('pos_customers')
                .update({ 
                    points: newPoints,
                    total_spent: (selectedCustomer.total_spent || 0) + total
                })
                .eq('phone', selectedCustomer.phone);
        }
        
        const orderId = data[0]?.id || invoiceNumber;
        const shortId = orderId.substring(0, 8).toUpperCase();
        
        alert(`✅ ຊຳລະສຳເລັດ!
        
ເລກທີບິນ: ${shortId}
ຍອດລວມ: ${formatLAK(total)}
ຊຳລະດ້ວຍ: ${paymentMethod}
${selectedCustomer ? `ລູກຄ້າ: ${selectedCustomer.name}` : ''}
⭐ ຄະແນນທີ່ໄດ້: +${pointsEarned}

ຂອບໃຈທີ່ໃຊ້ບໍລິການ!`);
        
        // Clear cart
        cart = [];
        selectedCustomer = null;
        appliedPoints = 0;
        currentDiscount = 0;
        document.getElementById('customer-phone').value = '';
        document.getElementById('customer-info').style.display = 'none';
        drawCart();
        
        showToast(`ຊຳລະສຳເລັດ! ${formatLAK(total)}`, 'success');
        
    } catch (err) {
        console.error('Sale error:', err);
        showToast('ເກີດຂໍ້ຜິດພາດ: ' + (err.message || 'ກະລຸນາລອງໃໝ່'), 'error');
    } finally {
        btn.disabled = false;
        btn.innerHTML = '✅ ສຳເລັດການຂາຍ';
        document.getElementById('barcode-input').focus();
    }
}

// Set user name
const userName = localStorage.getItem('lsm_user_name');
document.getElementById('user-name-display').innerHTML = `👤 ${userName || 'Cashier'}`;

// Event listeners
document.getElementById('barcode-input').addEventListener('keypress', (e) => {
    if (e.key === 'Enter') {
        searchProduct(e.target.value);
        e.target.value = '';
    }
});

document.getElementById('customer-phone').addEventListener('input', searchCustomer);

// Initialize
drawCart();
document.getElementById('barcode-input').focus();

console.log('✅ POS Ready - Enter barcode: 1001, 1002, 1003, or 1007');
</script>
</body>
</html>
