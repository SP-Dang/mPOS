<!DOCTYPE html>
<html lang="lo">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mPOS | ຂາຍສິນຄ້າ</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Phetsarath:wght@400;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --primary: #10b981;
            --primary-dark: #059669;
            --primary-light: #d1fae5;
            --danger: #ef4444;
            --danger-light: #fee2e2;
            --warning: #f59e0b;
            --warning-light: #fef3c7;
            --sidebar: #0f172a;
            --bg: #f8fafc;
            --text: #1e293b;
            --text-light: #64748b;
            --border: #e2e8f0;
            --lao: 'Phetsarath', sans-serif;
        }
        
        body {
            margin: 0;
            display: flex;
            background: var(--bg);
            font-family: 'Plus Jakarta Sans', var(--lao);
            height: 100vh;
            overflow: hidden;
        }
        
        /* Sidebar */
        .sidebar {
            width: 260px;
            background: var(--sidebar);
            color: white;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }
        
        .logo {
            padding: 24px 20px;
            font-size: 22px;
            font-weight: 800;
            color: var(--primary);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .nav-menu {
            flex: 1;
            padding: 20px;
        }
        
        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            color: #94a3b8;
            text-decoration: none;
            border-radius: 12px;
            margin-bottom: 8px;
            transition: all 0.2s;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
        }
        
        .nav-item:hover {
            background: rgba(255,255,255,0.05);
            color: white;
        }
        
        .nav-item.active {
            background: var(--primary);
            color: white;
        }
        
        /* Admin only class - hidden for cashiers */
        .admin-only {
            display: flex;
        }
        
        .user-info {
            padding: 20px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        
        .user-name {
            font-weight: 600;
            margin-bottom: 10px;
            font-size: 13px;
        }
        
        .logout-btn {
            background: rgba(239, 68, 68, 0.2);
            color: #f87171;
            border: none;
            width: 100%;
            padding: 10px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            text-align: left;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        /* Main Content */
        .checkout-container {
            flex: 1;
            display: flex;
            overflow: hidden;
        }
        
        .cart-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            padding: 20px;
        }
        
        .cart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .cart-header h1 {
            font-size: 24px;
            color: var(--text);
        }
        
        .barcode-input {
            display: flex;
            gap: 10px;
        }
        
        .barcode-input input {
            padding: 12px 16px;
            border: 2px solid var(--border);
            border-radius: 12px;
            font-size: 14px;
            width: 280px;
            outline: none;
            font-family: monospace;
            font-size: 16px;
        }
        
        .barcode-input input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(16,185,129,0.1);
        }
        
        .barcode-input button {
            padding: 12px 20px;
            background: var(--sidebar);
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
        }
        
        /* Hold Bills Panel */
        .hold-panel {
            background: white;
            border-radius: 16px;
            padding: 12px 15px;
            margin-bottom: 15px;
            border: 1px solid var(--border);
            display: none;
        }
        
        .hold-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        
        .hold-header h3 {
            font-size: 13px;
            color: var(--text-light);
        }
        
        .hold-header button {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 16px;
            color: var(--text-light);
        }
        
        .hold-bills {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        
        .hold-bill-item {
            background: var(--primary-light);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            color: var(--primary-dark);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
        }
        
        .hold-bill-item:hover {
            background: var(--primary);
            color: white;
        }
        
        .hold-bill-item .remove-hold {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 14px;
            color: inherit;
        }
        
        /* Cart Table */
        .cart-table-container {
            flex: 1;
            overflow-y: auto;
            background: white;
            border-radius: 20px;
            border: 1px solid var(--border);
        }
        
        .cart-table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .cart-table th {
            padding: 15px;
            text-align: left;
            background: #f8fafc;
            font-size: 12px;
            font-weight: 700;
            color: var(--text-light);
            text-transform: uppercase;
            border-bottom: 1px solid var(--border);
        }
        
        .cart-table td {
            padding: 12px 15px;
            border-bottom: 1px solid var(--border);
        }
        
        .item-name {
            font-weight: 700;
            font-size: 14px;
        }
        
        .item-barcode {
            font-size: 10px;
            color: var(--text-light);
            font-family: monospace;
        }
        
        .qty-control {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .qty-btn {
            width: 28px;
            height: 28px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: white;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }
        
        .qty-btn:hover {
            background: var(--primary-light);
            border-color: var(--primary);
        }
        
        .remove-btn {
            background: none;
            border: none;
            color: var(--danger);
            cursor: pointer;
            font-size: 18px;
        }
        
        /* Summary Section */
        .summary-section {
            width: 360px;
            background: white;
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 20px;
        }
        
        .loyalty-box {
            background: var(--primary-light);
            border-radius: 16px;
            padding: 15px;
            margin-bottom: 20px;
        }
        
        .loyalty-box label {
            font-size: 12px;
            font-weight: 700;
            color: var(--primary-dark);
            display: block;
            margin-bottom: 8px;
        }
        
        .loyalty-input {
            width: 100%;
            padding: 10px;
            border: 2px solid transparent;
            border-radius: 10px;
            outline: none;
            font-size: 14px;
        }
        
        .loyalty-input:focus {
            border-color: var(--primary);
        }
        
        .customer-info {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px dashed var(--primary);
            font-size: 13px;
        }
        
        .payment-methods {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .pay-btn {
            padding: 14px;
            border: 2px solid var(--border);
            border-radius: 12px;
            background: white;
            cursor: pointer;
            font-weight: 700;
            transition: all 0.2s;
            font-family: inherit;
        }
        
        .pay-btn.active {
            border-color: var(--primary);
            background: var(--primary-light);
            color: var(--primary-dark);
        }
        
        .total-card {
            background: var(--sidebar);
            border-radius: 20px;
            padding: 20px;
            color: white;
            margin-bottom: 20px;
        }
        
        .total-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 14px;
        }
        
        .grand-total {
            font-size: 24px;
            font-weight: 800;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid rgba(255,255,255,0.2);
        }
        
        .action-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }
        
        .btn-hold {
            flex: 1;
            background: var(--warning);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            font-family: inherit;
        }
        
        .btn-clear {
            flex: 1;
            background: var(--danger);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            font-family: inherit;
        }
        
        .btn-complete {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-weight: 800;
            font-size: 16px;
            cursor: pointer;
            font-family: inherit;
        }
        
        .btn-complete:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .empty-cart {
            text-align: center;
            padding: 60px;
            color: var(--text-light);
        }
        
        /* Animation */
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        @keyframes slideOut {
            from { transform: translateX(0); opacity: 1; }
            to { transform: translateX(100%); opacity: 0; }
        }
    </style>
</head>

<nav class="sidebar">
    <div class="logo"><span>⚡</span> mPOS</div>
    <div class="nav-menu">
        <a href="index.html" class="nav-item admin-only">📊 Dashboard</a>
        <a href="pos-checkout.html" class="nav-item active">🛒 ຂາຍສິນຄ້າ</a>
        <a href="pos-orders.html" class="nav-item admin-only">📄 ປະຫວັດການສັ່ງຊື້</a>
        <a href="pos-inventory.html" class="nav-item admin-only">📦 ຄັງສິນຄ້າ</a>
        <a href="pos-customers.html" class="nav-item">👥 ລູກຄ້າ</a>
        <a href="pos-reports.html" class="nav-item admin-only">📊 ລາຍງານ</a>
    </div>
    <div class="user-info">
        <div class="user-name" id="user-name-display">ກຳລັງໂຫຼດ...</div>

</nav>

<div class="checkout-container">
    <div class="cart-section">
        <div class="cart-header">
            <h1>🛒 ລາຍການສິນຄ້າ</h1>
            <div class="barcode-input">
                <input type="text" id="barcode-input" placeholder="ສະແກນ ຫຼື ປ້ອນບາໂຄດ..." autofocus>
                <button onclick="manualSearch()">🔍 ຄົ້ນຫາ</button>
            </div>
        </div>
        
        <!-- Hold Bills Panel -->
        <div class="hold-panel" id="hold-panel">
            <div class="hold-header">
                <h3>📋 ບິນທີ່ຖືໄວ້ (Hold Bills)</h3>
                <button onclick="toggleHoldPanel()">✕</button>

            <div class="hold-bills" id="hold-bills-list"></div>

            <table class="cart-table">

                    <tr>
                        <th>ສິນຄ້າ</th>

                        <td colspan="5" class="empty-cart">🛍️ ຍັງບໍ່ມີສິນຄ້າ<br>ກະລຸນາສະແກນບາໂຄດ</td>

<script>
// =====================================================
// POS CHECKOUT - PAGE SPECIFIC CODE
// =====================================================

// State variables
let cart = [];
let selectedCustomer = null;
let paymentMethod = "Cash";
let holdBills = [];
let appliedPoints = 0;
let currentDiscount = 0;

// Load hold bills from localStorage
function loadHoldBills() {
    const saved = localStorage.getItem('lsm_hold_bills');
    if (saved) {
        holdBills = JSON.parse(saved);
        updateHoldPanel();
    }
}

function saveHoldBills() {
    localStorage.setItem('lsm_hold_bills', JSON.stringify(holdBills));
    updateHoldPanel();
}

function updateHoldPanel() {
    const panel = document.getElementById('hold-panel');
    const container = document.getElementById('hold-bills-list');
    
    if (holdBills.length > 0) {
        panel.style.display = 'block';
        container.innerHTML = holdBills.map((bill, idx) => `
            <div class="hold-bill-item" onclick="loadHoldBill(${idx})">
                <span>📌 ${bill.name}</span>
                <span>${formatLAK(bill.total)}</span>
                <button class="remove-hold" onclick="event.stopPropagation(); removeHoldBill(${idx})">✕</button>
            </div>
        `).join('');
    } else {
        panel.style.display = 'none';
    }
}

function toggleHoldPanel() {
    const panel = document.getElementById('hold-panel');
    panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
}

function holdBill() {
    if (cart.length === 0) {
        showToast('ບໍ່ມີສິນຄ້າໃນລາຍການ', 'warning');
        return;
    }
    
    const name = prompt('ປ້ອນຊື່ລູກຄ້າ ຫຼື ເລກທີ່ບິນ:', `ບິນ ${holdBills.length + 1}`);
    const { total } = calculateCartTotals(cart, window.TAX_RATE || 7);
    
    holdBills.push({
        id: Date.now(),
        name: name || `ບິນ ${holdBills.length + 1}`,
        cart: JSON.parse(JSON.stringify(cart)),
        total: total,
        createdAt: new Date().toISOString()
    });
    
    saveHoldBills();
    clearCartSilent();
    showToast(`ຖືບິນ "${name}" ສຳເລັດ`, 'success');
}

function loadHoldBill(index) {
    const bill = holdBills[index];
    if (!bill) return;
    
    if (cart.length > 0) {
        if (confirm('ທ່ານມີລາຍການທີ່ຍັງບໍ່ທັນສຳເລັດ. ຕ້ອງການຍົກເລີກ ແລະ ໂຫຼດບິນທີ່ຖືໄວ້?')) {
            loadBillData(bill, index);
        }
    } else {
        loadBillData(bill, index);
    }
}

function loadBillData(bill, index) {
    cart = JSON.parse(JSON.stringify(bill.cart));
    selectedCustomer = bill.customer || null;
    paymentMethod = bill.paymentMethod || "Cash";
    
    drawCart();
    updatePaymentMethodUI();
    
    if (selectedCustomer) {
        document.getElementById('customer-phone').value = selectedCustomer.phone;
        displayCustomerInfo(selectedCustomer);
    }
    
    holdBills.splice(index, 1);
    saveHoldBills();
    showToast(`ໂຫຼດບິນ "${bill.name}" ສຳເລັດ`, 'success');
}

function removeHoldBill(index) {
    if (confirm('ຕ້ອງການລຶບບິນທີ່ຖືໄວ້ນີ້?')) {
        holdBills.splice(index, 1);
        saveHoldBills();
        showToast('ລຶບສຳເລັດ', 'success');
    }
}

// Calculate totals using shared utility
function calculateTotals() {
    return calculateCartTotals(cart, window.TAX_RATE || 7);
}

function updateTotals() {
    const { subtotal, tax, total } = calculateTotals();
    document.getElementById('subtotal-display').innerHTML = formatLAK(subtotal);
    document.getElementById('tax-display').innerHTML = formatLAK(tax);
    
    const finalTotal = total - currentDiscount;
    document.getElementById('grand-total').innerHTML = formatLAK(finalTotal);
    
    if (currentDiscount > 0) {
        document.getElementById('discount-row').style.display = 'flex';
        document.getElementById('discount-display').innerHTML = `-${formatLAK(currentDiscount)}`;
    } else {
        document.getElementById('discount-row').style.display = 'none';
    }
}

function drawCart() {
    const tbody = document.getElementById('cart-body');
    
    if (cart.length === 0) {
        tbody.innerHTML = '<tr><td colspan="5" class="empty-cart">🛍️ ຍັງບໍ່ມີສິນຄ້າ<br>ກະລຸນາສະແກນບາໂຄດ</td></tr>';
        updateTotals();
        return;
    }
    
    tbody.innerHTML = cart.map((item, idx) => `
        <tr>
            <td>
                <div class="item-name">${item.name}</div>
                <div class="item-barcode">${item.barcode}</div>
            </td>
            <td>${formatLAK(item.retail_price)}</td>
            <td>
                <div class="qty-control">
                    <button class="qty-btn" onclick="adjustQuantity(${idx}, -1)">-</button>
                    <span style="min-width: 30px; text-align: center;">${item.qty}</span>
                    <button class="qty-btn" onclick="adjustQuantity(${idx}, 1)">+</button>
                </div>
            </td>
            <td style="font-weight: 700;">${formatLAK(item.retail_price * item.qty)}</td>
            <td><button class="remove-btn" onclick="removeItem(${idx})">🗑️</button></td>
        </table>
    `).join('');
    
    updateTotals();
}

function adjustQuantity(idx, delta) {
    const newQty = cart[idx].qty + delta;
    if (newQty < 1) {
        removeItem(idx);
        return;
    }
    
    if (delta > 0 && newQty > cart[idx].stock_qty) {
        showToast(`ສິນຄ້າເຫຼືອພຽງ ${cart[idx].stock_qty} ຊິ້ນ`, 'warning');
        return;
    }
    
    cart[idx].qty = newQty;
    drawCart();
}

function removeItem(idx) {
    cart.splice(idx, 1);
    drawCart();
}

function clearCart() {
    if (cart.length === 0) return;
    if (confirm('ຕ້ອງການລຶບສິນຄ້າທັງໝົດໃນລາຍການ?')) {
        clearCartSilent();
        showToast('ລຶບລາຍການທັງໝົດສຳເລັດ', 'info');
    }
}

function clearCartSilent() {
    cart = [];
    selectedCustomer = null;
    appliedPoints = 0;
    currentDiscount = 0;
    document.getElementById('customer-phone').value = '';
    document.getElementById('customer-info').style.display = 'none';
    drawCart();
}

// Search product from Supabase (using shared supabase client)
async function searchProduct(barcode) {
    if (!barcode.trim()) return false;
    
    try {
        const { data, error } = await supabase
            .from('pos_products')
            .select('*')
            .eq('barcode', barcode.trim())
            .single();
        
        if (error || !data) {
            showToast('ບໍ່ພົບສິນຄ້າ!', 'error');
            return false;
        }
        
        // Check if already in cart
        const existing = cart.find(i => i.barcode === data.barcode);
        if (existing) {
            if (existing.qty + 1 > data.stock_qty) {
                showToast(`ສິນຄ້າເຫຼືອພຽງ ${data.stock_qty} ຊິ້ນ`, 'warning');
                return true;
            }
            existing.qty++;
        } else {
            cart.push({ 
                id: data.id,
                barcode: data.barcode, 
                name: data.name, 
                retail_price: data.retail_price, 
                stock_qty: data.stock_qty,
                qty: 1 
            });
        }
        
        drawCart();
        showToast(`ເພີ່ມ ${data.name} ສຳເລັດ`, 'success');
        return true;
        
    } catch (err) {
        console.error(err);
        showToast('ເກີດຂໍ້ຜິດພາດ', 'error');
        return false;
    }
}

function manualSearch() {
    const barcode = prompt('ປ້ອນບາໂຄດສິນຄ້າ:');
    if (barcode) {
        searchProduct(barcode);
        document.getElementById('barcode-input').value = '';
        document.getElementById('barcode-input').focus();
    }
}

// Barcode input handler
document.getElementById('barcode-input').addEventListener('keypress', async (e) => {
    if (e.key === 'Enter') {
        await searchProduct(e.target.value);
        e.target.value = '';
    }
});

// Search customer
async function searchCustomer() {
    const phone = document.getElementById('customer-phone').value.trim();
    
    if (phone.length < 10) {
        document.getElementById('customer-info').style.display = 'none';
        selectedCustomer = null;
        return;
    }
    
    try {
        const { data, error } = await supabase
            .from('pos_customers')
            .select('*')
            .eq('phone', phone)
            .single();
        
        if (data) {
            selectedCustomer = data;
            displayCustomerInfo(data);
        } else {
            selectedCustomer = null;
            document.getElementById('customer-info').style.display = 'none';
        }
    } catch (err) {
        console.error(err);
    }
}

function displayCustomerInfo(customer) {
    document.getElementById('customer-name').innerHTML = `👤 ${customer.name}`;
    document.getElementById('customer-points').innerText = (customer.points || 0).toLocaleString();
    document.getElementById('customer-info').style.display = 'block';
}

// Apply loyalty points
async function applyPoints() {
    if (!selectedCustomer) {
        showToast('ກະລຸນາເລືອກລູກຄ້າສະມາຊິກກ່ອນ', 'warning');
        return;
    }
    
    const { subtotal, tax } = calculateTotals();
    const pointsValue = 1000; // 1 point = 1000 LAK
    const maxPointsValue = Math.floor((subtotal + tax) / pointsValue);
    const availablePoints = Math.min(selectedCustomer.points, maxPointsValue);
    
    if (availablePoints <= 0) {
        showToast('ຄະແນນບໍ່ພຽງພໍສຳລັບການຫຼຸດລາຄາ', 'warning');
        return;
    }
    
    const pointsToUse = prompt(`ທ່ານມີ ${selectedCustomer.points} ຄະແນນ. ຕ້ອງການໃຊ້ຈັກຄະແນນ? (ສູງສຸດ ${availablePoints})`, availablePoints);
    
    if (pointsToUse && !isNaN(pointsToUse) && pointsToUse > 0) {
        const usePoints = Math.min(parseInt(pointsToUse), availablePoints);
        appliedPoints = usePoints;
        currentDiscount = usePoints * pointsValue;
        updateTotals();
        showToast(`ໃຊ້ ${usePoints} ຄະແນນ, ຫຼຸດ ${formatLAK(currentDiscount)}`, 'success');
    }
}

// Set payment method
function setPaymentMethod(method, btnElement) {
    paymentMethod = method;
    document.querySelectorAll('.pay-btn').forEach(btn => btn.classList.remove('active'));
    btnElement.classList.add('active');
    showToast(`ເລືອກຊຳລະດ້ວຍ ${method}`, 'info');
}

function updatePaymentMethodUI() {
    document.querySelectorAll('.pay-btn').forEach(btn => {
        if (btn.innerText.includes(paymentMethod)) {
            btn.classList.add('active');
        }
    });
}

// Process sale
async function processSale() {
    if (cart.length === 0) {
        showToast('ກະລຸນາເພີ່ມສິນຄ້າກ່ອນ', 'warning');
        return;
    }
    
    const btn = document.getElementById('btn-complete');
    btn.disabled = true;
    btn.innerHTML = '⏳ ກຳລັງດຳເນີນການ...';
    
    try {
        const { subtotal, tax, total } = calculateTotals();
        const finalTotal = total - currentDiscount;
        const cashierName = getCurrentUser().name || 'Cashier';
        const pointsEarned = Math.floor(finalTotal / (window.POINTS_RATE || 10000));
        
        // For cash payment, show change dialog
        if (paymentMethod === 'Cash') {
            const received = prompt(`ຍອດລວມ: ${formatLAK(finalTotal)}\nເງິນທີ່ລູກຄ້າໃຫ້ມາ:`, Math.ceil(finalTotal / 1000) * 1000);
            if (received === null) {
                btn.disabled = false;
                btn.innerHTML = '✅ ສຳເລັດການຂາຍ';
                return;
            }
            const cashReceived = parseFloat(received);
            if (isNaN(cashReceived)) {
                showToast('ກະລຸນາປ້ອນຈຳນວນເງິນ', 'error');
                btn.disabled = false;
                btn.innerHTML = '✅ ສຳເລັດການຂາຍ';
                return;
            }
            const change = cashReceived - finalTotal;
            if (change < 0) {
                showToast('ເງິນບໍ່ພໍ!', 'error');
                btn.disabled = false;
                btn.innerHTML = '✅ ສຳເລັດການຂາຍ';
                return;
            }
            if (change > 0) {
                alert(`ເງິນທອນ: ${formatLAK(change)}`);
            }
        }
        
        // Verify stock before processing
        for (const item of cart) {
            const { data: currentStock } = await supabase
                .from('pos_products')
                .select('stock_qty')
                .eq('barcode', item.barcode)
                .single();
            
            if (!currentStock || currentStock.stock_qty < item.qty) {
                showToast(`${item.name} ມີເຫຼືອພຽງ ${currentStock?.stock_qty || 0} ຊິ້ນ`, 'error');
                btn.disabled = false;
                btn.innerHTML = '✅ ສຳເລັດການຂາຍ';
                return;
            }
        }
        
        // Deduct inventory
        for (const item of cart) {
            const newStock = item.stock_qty - item.qty;
            await supabase
                .from('pos_products')
                .update({ stock_qty: newStock, last_updated: new Date().toISOString() })
                .eq('barcode', item.barcode);
        }
        
        // Save sale to Supabase
        const orderId = 'ORD-' + Date.now().toString().slice(-8);
        const { error: saleError } = await supabase
            .from('pos_sales')
            .insert([{
                items: cart,
                total_amount: finalTotal,
                payment_method: paymentMethod,
                customer_phone: selectedCustomer?.phone || null,
                status: 'COMPLETED'
            }]);
        
        if (saleError) {
            console.error('Sale save error:', saleError);
        }
        
        // Update customer points if applicable
        if (selectedCustomer) {
            const newPoints = (selectedCustomer.points || 0) + pointsEarned - appliedPoints;
            await supabase
                .from('pos_customers')
                .update({ 
                    points: newPoints,
                    total_spent: (selectedCustomer.total_spent || 0) + finalTotal
                })
                .eq('phone', selectedCustomer.phone);
        }
        
        // Build receipt
        let receiptItems = cart.map(item => `${item.name} x${item.qty} = ${formatLAK(item.retail_price * item.qty)}`).join('\n');
        
        const receipt = `
═══════════════════════
        ໃບຮັບເງິນ
═══════════════════════
ເລກທີບິນ: ${orderId}
ວັນທີ: ${new Date().toLocaleString('lo-LA')}
ພະນັກງານ: ${cashierName}
═══════════════════════
${receiptItems}
═══════════════════════
ຍອດຍ່ອຍ: ${formatLAK(subtotal)}
ອາກອນ (7%): ${formatLAK(tax)}
${currentDiscount > 0 ? `ສ່ວນຫຼຸດ: -${formatLAK(currentDiscount)}\n` : ''}
ຍອດລວມ: ${formatLAK(finalTotal)}
ຊຳລະດ້ວຍ: ${paymentMethod}
═══════════════════════
ຄະແນນທີ່ໄດ້ຮັບ: +${pointsEarned}
═══════════════════════
ຂອບໃຈທີ່ໃຊ້ບໍລິການ!
LSM POS
        `;
        
        alert(receipt);
        
        // Clear cart
        clearCartSilent();
        appliedPoints = 0;
        currentDiscount = 0;
        
        showToast(`ຊຳລະສຳເລັດ! ${formatLAK(finalTotal)}`, 'success');
        
    } catch (err) {
        console.error('Sale error:', err);
        showToast('ເກີດຂໍ້ຜິດພາດ, ກະລຸນາລອງໃໝ່', 'error');
    } finally {
        btn.disabled = false;
        btn.innerHTML = '✅ ສຳເລັດການຂາຍ';
        document.getElementById('barcode-input').focus();
    }
}

// Event listeners
document.getElementById('customer-phone').addEventListener('input', searchCustomer);

// Initialize page
function init() {
    // Check authentication
    if (!checkAuth()) return;
    
    // Display user name
    displayUserName();
    
    // Setup role-based menu hiding
    setupRoleBasedMenus();
    
    // Load hold bills
    loadHoldBills();
    
    // Draw cart
    drawCart();
    
    // Focus on barcode input
    document.getElementById('barcode-input').focus();
}

// Start the app
init();
</script>
