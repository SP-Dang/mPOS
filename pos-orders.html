<!DOCTYPE html>
<html lang="lo">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mPOS | ປະຫວັດການສັ່ງຊື້</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Phetsarath:wght@400;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #10b981;
            --primary-dark: #059669;
            --danger: #ef4444;
            --warning: #f59e0b;
            --sidebar: #0f172a;
            --bg: #f8fafc;
            --text: #1e293b;
            --text-light: #64748b;
            --border: #e2e8f0;
            --lao: 'Phetsarath', sans-serif;
        }
        body {
            margin: 0;
            display: flex;
            background: var(--bg);
            font-family: 'Plus Jakarta Sans', var(--lao);
            height: 100vh;
            overflow: hidden;
        }
        .sidebar {
            width: 260px;
            background: var(--sidebar);
            color: white;
            display: flex;
            flex-direction: column;
        }
        .logo {
            padding: 24px 20px;
            font-size: 22px;
            font-weight: 800;
            color: var(--primary);
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .nav-menu { flex: 1; padding: 20px; }
        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            color: #94a3b8;
            text-decoration: none;
            border-radius: 12px;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 14px;
        }
        .nav-item:hover { background: rgba(255,255,255,0.05); color: white; }
        .nav-item.active { background: var(--primary); color: white; }
        .admin-only { display: flex; }
        .user-info { padding: 20px; border-top: 1px solid rgba(255,255,255,0.1); }
        .user-name { font-weight: 600; margin-bottom: 10px; font-size: 13px; }
        .logout-btn {
            background: rgba(239, 68, 68, 0.2);
            color: #f87171;
            border: none;
            width: 100%;
            padding: 10px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            text-align: left;
        }
        .main {
            flex: 1;
            overflow-y: auto;
            padding: 30px;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            flex-wrap: wrap;
            gap: 15px;
        }
        .header h1 { font-size: 24px; color: var(--text); }
        .search-box {
            display: flex;
            gap: 10px;
        }
        .search-box input {
            padding: 12px 16px;
            border: 2px solid var(--border);
            border-radius: 12px;
            width: 300px;
            outline: none;
            font-family: monospace;
            font-size: 14px;
        }
        .search-box button {
            padding: 12px 24px;
            background: var(--sidebar);
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
        }
        .order-card {
            background: white;
            border-radius: 20px;
            border: 1px solid var(--border);
            margin-bottom: 20px;
            padding: 20px;
        }
        .order-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border);
        }
        .order-id { font-family: monospace; font-weight: 800; font-size: 16px; }
        .order-status {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
        }
        .status-completed { background: #d1fae5; color: #065f46; }
        .status-refunded { background: #fee2e2; color: #b91c1c; }
        .order-items {
            margin: 15px 0;
        }
        .item-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #f1f5f9;
        }
        .order-total {
            text-align: right;
            font-size: 18px;
            font-weight: 800;
            color: var(--primary);
            margin-top: 10px;
        }
        .order-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        .print-btn, .return-btn {
            padding: 8px 16px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
        }
        .print-btn { background: #e0f2fe; color: #0369a1; }
        .return-btn { background: #fee2e2; color: #b91c1c; }
        .return-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .no-results { text-align: center; padding: 60px; color: var(--text-light); }
        
        .toast {
            position: fixed; bottom: 20px; right: 20px; padding: 12px 20px;
            border-radius: 12px; color: white; font-weight: bold; z-index: 10000;
            animation: slideIn 0.3s ease;
        }
        .toast-success { background: #10b981; }
        .toast-error { background: #ef4444; }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        @keyframes slideOut {
            from { transform: translateX(0); opacity: 1; }
            to { transform: translateX(100%); opacity: 0; }
        }
        @media print {
            body * { visibility: hidden; }
            .receipt-print, .receipt-print * { visibility: visible; }
            .receipt-print {
                position: absolute;
                left: 0;
                top: 0;
                width: 80mm;
                padding: 8px;
                font-family: monospace;
                font-size: 11px;
            }
            @page { size: 80mm auto; margin: 0; }
        }
    </style>
</head>
<body>

<nav class="sidebar">
    <div class="logo"><span>⚡</span> mPOS</div>
    <div class="nav-menu">
        <a href="index.html" class="nav-item admin-only">📊 Dashboard</a>
        <a href="pos-checkout.html" class="nav-item">🛒 ຂາຍສິນຄ້າ</a>
        <a href="pos-inventory.html" class="nav-item admin-only">📦 ຄັງສິນຄ້າ</a>
        <a href="pos-customers.html" class="nav-item">👥 ລູກຄ້າ</a>
        <a href="pos-orders.html" class="nav-item active">📄 ປະຫວັດການສັ່ງຊື້</a>
        <a href="pos-reports.html" class="nav-item admin-only">📊 ລາຍງານ</a>
    </div>
    <div class="user-info">
        <div class="user-name" id="user-name-display">ກຳລັງໂຫຼດ...</div>
        <button class="logout-btn" onclick="handleLogout()">🚪 ອອກຈາກລະບົບ</button>
    </div>
</nav>

<main class="main">
    <div class="header">
        <h1>📄 ປະຫວັດການສັ່ງຊື້</h1>
        <div class="search-box">
            <input type="text" id="search-input" placeholder="ສະແກນ ຫຼື ປ້ອນເລກທີບິນ..." autofocus>
            <button onclick="searchOrder()">🔍 ຄົ້ນຫາ</button>
        </div>
    </div>
    <div id="results-container"></div>
</main>

<!-- Receipt Template for Reprint -->
<div id="receipt-template" style="display: none;">
    <div class="receipt-print" style="text-align: center;">
        <div style="border-bottom: 1px dashed #000; padding-bottom: 8px;">
            <h3 style="margin: 0;">LSM RETAIL</h3>
            <p style="margin: 2px 0; font-size: 10px;">ໂທ: 02055348882</p>
            <p id="receipt-datetime" style="font-size: 10px;"></p>
        </div>
        <div id="receipt-customer-info" style="font-size: 10px; margin: 5px 0;"></div>
        <div>ເລກທີບິນ: <b id="receipt-order-id"></b></div>
        <div style="border-top: 1px dashed #000; border-bottom: 1px dashed #000; padding: 5px 0; margin: 5px 0;">
            <div id="receipt-items-list"></div>
        </div>
        <div id="receipt-totals"></div>
        <div style="margin: 8px 0;"><svg id="receipt-barcode" width="140" height="30"></svg></div>
        <div style="border-top: 1px dashed #000; padding-top: 5px; font-size: 9px;">
            ຂອບໃຈທີ່ໃຊ້ບໍລິການ<br>Powered by LSM POS
        </div>
    </div>
</div>

<script src="js/config.js"></script>
<script src="js/utils.js"></script>
<script src="js/auth.js"></script>

<script>
function formatLAK(amount) {
    return new Intl.NumberFormat('lo-LA').format(amount) + ' ₭';
}

function showToast(message, type) {
    const toast = document.createElement('div');
    toast.className = `toast toast-${type}`;
    toast.textContent = message;
    document.body.appendChild(toast);
    setTimeout(() => {
        toast.style.animation = 'slideOut 0.3s ease';
        setTimeout(() => toast.remove(), 300);
    }, 3000);
}

async function searchOrder() {
    const searchText = document.getElementById('search-input').value.trim();
    if (!searchText) {
        showToast('ກະລຸນາປ້ອນເລກທີບິນ', 'warning');
        return;
    }
    
    const container = document.getElementById('results-container');
    container.innerHTML = '<div style="text-align: center; padding: 40px;">ກຳລັງຄົ້ນຫາ...</div>';
    
    try {
        const { data, error } = await window.supabaseClient
            .from('pos_sales')
            .select('*')
            .ilike('id', `${searchText}%`)
            .order('created_at', { ascending: false });
        
        if (error) throw error;
        
        if (!data || data.length === 0) {
            container.innerHTML = '<div class="no-results">❌ ບໍ່ພົບຂໍ້ມູນບິນນີ້</div>';
            return;
        }
        
        container.innerHTML = data.map(order => renderOrderCard(order)).join('');
        
    } catch (err) {
        console.error(err);
        container.innerHTML = '<div class="no-results">❌ ເກີດຂໍ້ຜິດພາດ</div>';
    }
}

function renderOrderCard(order) {
    const shortId = order.id.substring(0, 8).toUpperCase();
    const isRefunded = order.status === 'Refunded';
    const statusClass = isRefunded ? 'status-refunded' : 'status-completed';
    const statusText = isRefunded ? '🔄 ຄືນສິນຄ້າແລ້ວ' : '✅ ຊຳລະແລ້ວ';
    const date = new Date(order.created_at).toLocaleString('lo-LA');
    const items = Array.isArray(order.items) ? order.items : JSON.parse(order.items || '[]');
    
    return `
        <div class="order-card" data-order-id="${order.id}">
            <div class="order-header">
                <div>
                    <span class="order-id">#${shortId}</span>
                    <div style="font-size: 12px; color: #64748b; margin-top: 4px;">${date}</div>
                </div>
                <div>
                    <span class="order-status ${statusClass}">${statusText}</span>
                </div>
            </div>
            <div class="order-items">
                ${items.map(item => `
                    <div class="item-row">
                        <span>${item.name} <b>x${item.qty}</b></span>
                        <span>${formatLAK(item.retail_price * item.qty)}</span>
                    </div>
                `).join('')}
            </div>
            <div class="order-total">
                ລວມທັງໝົດ: ${formatLAK(order.total_amount)}
            </div>
            <div class="order-actions">
                <button class="print-btn" onclick="reprintReceipt('${order.id}')">🖨️ ພິມໃບບິນຄືນ</button>
                ${!isRefunded ? `<button class="return-btn" onclick="processReturn('${order.id}')">🔄 ຄືນສິນຄ້າ</button>` : ''}
            </div>
        </div>
    `;
}

async function reprintReceipt(orderId) {
    try {
        const { data, error } = await window.supabaseClient
            .from('pos_sales')
            .select('*')
            .eq('id', orderId)
            .single();
        
        if (error) throw error;
        
        const shortId = data.id.substring(0, 8).toUpperCase();
        const items = Array.isArray(data.items) ? data.items : JSON.parse(data.items || '[]');
        const now = new Date();
        
        document.getElementById('receipt-datetime').innerHTML = now.toLocaleString('lo-LA');
        document.getElementById('receipt-order-id').innerHTML = shortId;
        document.getElementById('receipt-customer-info').innerHTML = data.customer_phone ? `<div>ລູກຄ້າ: ${data.customer_phone}</div>` : '';
        
        const itemsHtml = items.map(item => `
            <div style="display: flex; justify-content: space-between;">
                <span>${item.name} x${item.qty}</span>
                <span>${formatLAK(item.retail_price * item.qty)}</span>
            </div>
        `).join('');
        document.getElementById('receipt-items-list').innerHTML = itemsHtml;
        
        document.getElementById('receipt-totals').innerHTML = `
            <div>ຍອດລວມ: ${formatLAK(data.total_amount)}</div>
            <div>ຊຳລະດ້ວຍ: ${data.payment_method}</div>
        `;
        
        JsBarcode("#receipt-barcode", shortId, { format: "CODE128", width: 1.2, height: 30, displayValue: true });
        
        setTimeout(() => {
            const content = document.querySelector('.receipt-print').cloneNode(true);
            const win = window.open('', '_blank');
            win.document.write(`<!DOCTYPE html><html><head><title>ໃບຮັບເງິນ</title><style>@page{size:80mm;margin:0}body{font-family:monospace;font-size:11px;width:80mm;margin:0;padding:8px}</style></head><body>${content.outerHTML}</body></html>`);
            win.print();
            win.close();
        }, 100);
        
    } catch (err) {
        console.error(err);
        showToast('ພິມບໍ່ສຳເລັດ', 'error');
    }
}

async function processReturn(orderId) {
    if (!confirm('ຢືນຢັນການຄືນສິນຄ້າ? ສິນຄ້າຈະຖືກເພີ່ມກັບຄືນສາງ')) return;
    
    const btn = document.querySelector(`.order-card[data-order-id="${orderId}"] .return-btn`);
    if (btn) {
        btn.disabled = true;
        btn.innerText = '⏳ ກຳລັງດຳເນີນ...';
    }
    
    try {
        const { data: order, error } = await window.supabaseClient
            .from('pos_sales')
            .select('*')
            .eq('id', orderId)
            .single();
        
        if (error) throw error;
        
        const items = Array.isArray(order.items) ? order.items : JSON.parse(order.items || '[]');
        
        // Restore inventory
        for (const item of items) {
            const { data: product } = await window.supabaseClient
                .from('pos_products')
                .select('stock_qty')
                .eq('barcode', item.barcode)
                .single();
            
            if (product) {
                await window.supabaseClient
                    .from('pos_products')
                    .update({ stock_qty: product.stock_qty + item.qty })
                    .eq('barcode', item.barcode);
            }
        }
        
        // Update order status
        const cashierName = getCurrentUser().name || 'System';
        await window.supabaseClient
            .from('pos_sales')
            .update({ status: 'Refunded', return_processed_by: cashierName })
            .eq('id', orderId);
        
        showToast('ຄືນສິນຄ້າສຳເລັດ', 'success');
        searchOrder(); // Refresh results
        
    } catch (err) {
        console.error(err);
        showToast('ເກີດຂໍ້ຜິດພາດ', 'error');
        if (btn) {
            btn.disabled = false;
            btn.innerText = '🔄 ຄືນສິນຄ້າ';
        }
    }
}

document.getElementById('search-input').addEventListener('keypress', (e) => {
    if (e.key === 'Enter') searchOrder();
});

function init() {
    if (!checkAuth()) return;
    const user = getCurrentUser();
    if (user.role !== 'GM') {
        window.location.href = 'pos-checkout.html';
        return;
    }
    displayUserName();
    document.getElementById('search-input').focus();
}

init();
</script>
</body>
</html>
