<!DOCTYPE html>
<html lang="lo">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mPOS | Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Phetsarath:wght@400;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #10b981;
            --primary-dark: #059669;
            --primary-light: #d1fae5;
            --danger: #ef4444;
            --warning: #f59e0b;
            --sidebar: #0f172a;
            --bg: #f8fafc;
            --text: #1e293b;
            --text-light: #64748b;
            --border: #e2e8f0;
            --lao: 'Phetsarath', sans-serif;
        }
        body {
            margin: 0;
            display: flex;
            background: var(--bg);
            font-family: 'Plus Jakarta Sans', var(--lao);
            height: 100vh;
            overflow: hidden;
        }
        .sidebar {
            width: 260px;
            background: var(--sidebar);
            color: white;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }
        .logo {
            padding: 24px 20px;
            font-size: 22px;
            font-weight: 800;
            color: var(--primary);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .nav-menu {
            flex: 1;
            padding: 20px;
        }
        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            color: #94a3b8;
            text-decoration: none;
            border-radius: 12px;
            margin-bottom: 8px;
            transition: all 0.2s;
            font-weight: 600;
            font-size: 14px;
        }
        .nav-item:hover {
            background: rgba(255,255,255,0.05);
            color: white;
        }
        .nav-item.active {
            background: var(--primary);
            color: white;
        }
        .user-info {
            padding: 20px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        .user-name {
            font-weight: 600;
            margin-bottom: 10px;
            font-size: 13px;
        }
        .logout-btn {
            background: rgba(239, 68, 68, 0.2);
            color: #f87171;
            border: none;
            width: 100%;
            padding: 10px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            text-align: left;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .main {
            flex: 1;
            overflow-y: auto;
            padding: 30px;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            border: 1px solid var(--border);
            transition: transform 0.2s;
        }
        .stat-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05);
        }
        .stat-label {
            font-size: 13px;
            color: var(--text-light);
            margin-bottom: 8px;
            font-weight: 600;
        }
        .stat-value {
            font-size: 28px;
            font-weight: 800;
            color: var(--text);
        }
        .chart-container {
            background: white;
            border-radius: 20px;
            padding: 20px;
            border: 1px solid var(--border);
            margin-bottom: 30px;
        }
        .closing-banner {
            background: linear-gradient(135deg, var(--sidebar), #1e293b);
            border-radius: 20px;
            padding: 25px;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        .btn-close-day {
            background: var(--primary);
            border: none;
            padding: 12px 24px;
            border-radius: 12px;
            color: white;
            font-weight: 700;
            cursor: pointer;
            font-family: inherit;
        }
        @media print {
            body * { visibility: hidden; }
            #print-section, #print-section * { visibility: visible; }
            #print-section { position: absolute; top: 0; left: 0; width: 100%; }
        }
    </style>
</head>
<body>

<nav class="sidebar">
    <div class="logo"><span>⚡</span> mPOS</div>
    <div class="nav-menu">
        <a href="index.html" class="nav-item active">📊 Dashboard</a>
        <a href="pos-checkout.html" class="nav-item">🛒 ຂາຍສິນຄ້າ</a>
        <a href="pos-orders.html" class="nav-item" id="nav-orders">📄 ປະຫວັດການສັ່ງຊື້</a>
        <a href="pos-inventory.html" class="nav-item" id="nav-inventory">📦 ຄັງສິນຄ້າ</a>
        <a href="pos-customers.html" class="nav-item">👥 ລູກຄ້າ</a>
        <a href="pos-reports.html" class="nav-item" id="nav-reports">📊 ລາຍງານ</a>
    </div>
    <div class="user-info">
        <div class="user-name" id="user-name-display">ກຳລັງໂຫຼດ...</div>
        <button class="logout-btn" onclick="logout()">🚪 ອອກຈາກລະບົບ</button>
    </div>
</nav>

<main class="main">
    <div class="header">
        <div>
            <h1>Dashboard</h1>
            <p id="date-display" style="color: var(--text-light); margin-top: 5px;"></p>
        </div>
        <div style="background: var(--primary-light); padding: 8px 16px; border-radius: 20px; color: var(--primary-dark); font-weight: 600;">
            🟢 ລະບົບປົກກະຕິ
        </div>
    </div>
    
    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-label">ຍອດຂາຍມື້ນີ້</div>
            <div class="stat-value" id="today-sales">₭0</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">ຈຳນວນບິນມື້ນີ້</div>
            <div class="stat-value" id="today-orders">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">ສິນຄ້າໃກ້ໝົດສາງ</div>
            <div class="stat-value" id="low-stock" style="color: var(--danger);">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">ສະມາຊິກທັງໝົດ</div>
            <div class="stat-value" id="total-customers">0</div>
        </div>
    </div>
    
    <div class="chart-container">
        <h3 style="margin-bottom: 15px;">ສະຖິຕິການຂາຍ 7 ວັນຍ້ອນຫຼັງ</h3>
        <canvas id="sales-chart" height="80"></canvas>
    </div>
    
    <div class="closing-banner">
        <div>
            <h3 style="margin-bottom: 5px;">ປິດຍອດປະຈຳວັນ</h3>
            <p style="opacity: 0.8; font-size: 13px;">ກວດສອບ ແລະ ບັນທຶກລາຍງານການເງິນ</p>
        </div>
        <button class="btn-close-day" onclick="alert('Daily closing feature - will be implemented with Supabase')">📊 ສະຫຼຸບ ແລະ ປິດຍອດ</button>
    </div>
</main>

<script src="js/config.js"></script>
<script src="js/utils.js"></script>
<script src="js/auth.js"></script>

<script>
    // Set date display
    document.getElementById('date-display').innerHTML = new Date().toLocaleDateString('lo-LA', { 
        weekday: 'long', 
        year: 'numeric', 
        month: 'long', 
        day: 'numeric' 
    });
    
    // Load user info
    const user = getCurrentUser();
    document.getElementById('user-name-display').innerHTML = `👤 ${user.name || 'Admin'}`;
    
    // Show/hide admin menu
    if (user.role !== 'GM' && user.role !== 'MANAGER') {
        document.getElementById('nav-inventory').style.display = 'none';
        document.getElementById('nav-reports').style.display = 'none';
        document.getElementById('nav-orders').style.display = 'none';
    }
    
    // Sample chart data
    const ctx = document.getElementById('sales-chart').getContext('2d');
    new Chart(ctx, {
        type: 'line',
        data: {
            labels: ['ຈັນ', 'ອັງຄານ', 'ພຸດ', 'ພະຫັດ', 'ສຸກ', 'ເສົາ', 'ອາທິດ'],
            datasets: [{
                label: 'ຍອດຂາຍ (₭)',
                data: [1250000, 2300000, 1980000, 3420000, 2870000, 4150000, 0],
                borderColor: '#10b981',
                backgroundColor: 'rgba(16, 185, 129, 0.05)',
                tension: 0.4,
                fill: true
            }]
        }
    });
</script>
     <script src="js/config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
