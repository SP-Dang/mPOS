<!DOCTYPE html>
<html lang="lo">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mPOS | ຄັງສິນຄ້າ</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Phetsarath:wght@400;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #10b981;
            --primary-dark: #059669;
            --primary-light: #d1fae5;
            --danger: #ef4444;
            --warning: #f59e0b;
            --sidebar: #0f172a;
            --bg: #f8fafc;
            --text: #1e293b;
            --text-light: #64748b;
            --border: #e2e8f0;
            --lao: 'Phetsarath', sans-serif;
        }
        body {
            margin: 0;
            display: flex;
            background: var(--bg);
            font-family: 'Plus Jakarta Sans', var(--lao);
            height: 100vh;
            overflow: hidden;
        }
        .sidebar {
            width: 260px;
            background: var(--sidebar);
            color: white;
            display: flex;
            flex-direction: column;
        }
        .logo {
            padding: 24px 20px;
            font-size: 22px;
            font-weight: 800;
            color: var(--primary);
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .nav-menu { flex: 1; padding: 20px; }
        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            color: #94a3b8;
            text-decoration: none;
            border-radius: 12px;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 14px;
        }
        .nav-item:hover { background: rgba(255,255,255,0.05); color: white; }
        .nav-item.active { background: var(--primary); color: white; }
        .admin-only { display: flex; }
        .user-info { padding: 20px; border-top: 1px solid rgba(255,255,255,0.1); }
        .user-name { font-weight: 600; margin-bottom: 10px; font-size: 13px; }
        .logout-btn {
            background: rgba(239, 68, 68, 0.2);
            color: #f87171;
            border: none;
            width: 100%;
            padding: 10px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            text-align: left;
        }
        .main {
            flex: 1;
            overflow-y: auto;
            padding: 30px;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            flex-wrap: wrap;
            gap: 15px;
        }
        .header h1 { font-size: 24px; color: var(--text); }
        .search-section {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .search-box {
            display: flex;
            gap: 10px;
        }
        .search-box input {
            padding: 10px 15px;
            border: 2px solid var(--border);
            border-radius: 12px;
            width: 250px;
            outline: none;
        }
        .search-box input:focus {
            border-color: var(--primary);
        }
        .search-box button, .add-btn, .export-btn {
            padding: 10px 20px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
        }
        .export-btn { background: var(--warning); }
        .stats-bar {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }
        .stat-card {
            background: white;
            padding: 15px;
            border-radius: 16px;
            border: 1px solid var(--border);
        }
        .stat-card .label { font-size: 12px; color: var(--text-light); }
        .stat-card .value { font-size: 24px; font-weight: 800; color: var(--text); }
        
        /* Table View for many products */
        .table-container {
            background: white;
            border-radius: 20px;
            border: 1px solid var(--border);
            overflow-x: auto;
        }
        .product-table {
            width: 100%;
            border-collapse: collapse;
            min-width: 800px;
        }
        .product-table th {
            padding: 15px;
            text-align: left;
            background: #f8fafc;
            font-size: 12px;
            font-weight: 700;
            color: var(--text-light);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
        }
        .product-table td {
            padding: 12px 15px;
            border-bottom: 1px solid var(--border);
        }
        .product-table tr:hover { background: #f8fafc; }
        .stock-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
        }
        .stock-normal { background: #d1fae5; color: #065f46; }
        .stock-low { background: #fee2e2; color: #b91c1c; }
        .stock-out { background: #fef3c7; color: #b45309; }
        .action-buttons {
            display: flex;
            gap: 8px;
        }
        .edit-btn, .delete-btn {
            padding: 5px 10px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 11px;
        }
        .edit-btn { background: var(--primary-light); color: var(--primary-dark); }
        .delete-btn { background: #fee2e2; color: var(--danger); }
        
        /* Pagination */
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-top: 25px;
            padding: 15px;
        }
        .pagination button {
            padding: 8px 16px;
            border: 1px solid var(--border);
            background: white;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }
        .pagination button:hover { background: var(--primary-light); }
        .pagination button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .pagination .current-page {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }
        
        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal-content {
            background: white;
            border-radius: 24px;
            padding: 25px;
            width: 480px;
            max-width: 90%;
            max-height: 90%;
            overflow-y: auto;
        }
        .modal-content h3 { margin-bottom: 20px; }
        .modal-content input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 2px solid var(--border);
            border-radius: 12px;
            outline: none;
        }
        .modal-buttons {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        .modal-buttons button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
        }
        .save-btn { background: var(--primary); color: white; }
        .cancel-btn { background: #f1f5f9; color: var(--text); }

            .form-group {
        margin-bottom: 15px;
    }
    .form-group label {
        display: block;
        font-size: 12px;
        font-weight: 600;
        color: var(--text);
        margin-bottom: 5px;
    }
    .form-group select, .form-group input {
        width: 100%;
        padding: 10px;
        border: 2px solid var(--border);
        border-radius: 10px;
        outline: none;
        font-size: 14px;
    }
    .form-group select:focus, .form-group input:focus {
        border-color: var(--primary);
    }
        
        .toast {
            position: fixed; bottom: 20px; right: 20px; padding: 12px 20px;
            border-radius: 12px; color: white; font-weight: bold; z-index: 10000;
            animation: slideIn 0.3s ease;
        }
        .toast-success { background: #10b981; }
        .toast-error { background: #ef4444; }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        @keyframes slideOut {
            from { transform: translateX(0); opacity: 1; }
            to { transform: translateX(100%); opacity: 0; }
        }
    </style>
</head>

<!-- Add/Edit Product Modal -->
<div id="product-modal" class="modal">
    <div class="modal-content">
        <h3 id="modal-title">➕ ເພີ່ມສິນຄ້າໃໝ່</h3>
        <input type="text" id="product-barcode" placeholder="📦 ບາໂຄດ *">
        <input type="text" id="product-name" placeholder="📝 ຊື່ສິນຄ້າ *">

        <input type="number" id="product-cost" placeholder="🏭 ລາຄາທຶນ (₭)">
        <input type="number" id="product-stock" placeholder="📊 ຈຳນວນໃນສາງ *">
        <input type="number" id="product-minstock" placeholder="⚠️ ຂັ້ນຕ່ຳເຕືອນ">
        <input type="text" id="product-category" placeholder="📂 ໝວດໝູ່">
        <div class="modal-buttons">
            <button class="save-btn" onclick="saveProduct()">💾 ບັນທຶກ</button>

<script>
let allProducts = [];
let filteredProducts = [];
let currentPage = 1;
let itemsPerPage = 20; // Show 20 items per page
let totalPages = 1;
let editingProduct = null;

function formatLAK(amount) {
    if (isNaN(amount)) return '₭0';
    return new Intl.NumberFormat('lo-LA').format(Math.round(amount)) + ' ₭';
}

function showToast(message, type) {
    const toast = document.createElement('div');
    toast.className = `toast toast-${type}`;
    toast.textContent = message;
    document.body.appendChild(toast);
    setTimeout(() => {
        toast.style.animation = 'slideOut 0.3s ease';
        setTimeout(() => toast.remove(), 300);
    }, 3000);
}

function getStockStatus(stock, minStock) {
    if (stock <= 0) return { class: 'stock-out', text: 'ໝົດສາງ' };
    if (stock <= minStock) return { class: 'stock-low', text: 'ໃກ້ໝົດ' };
    return { class: 'stock-normal', text: 'ປົກກະຕິ' };
}

async function loadProducts() {
    try {
        const { data, error } = await window.supabaseClient
            .from('pos_products')
            .select('*')
            .order('name');
        
        if (error) throw error;
        allProducts = data || [];
        filteredProducts = [...allProducts];
        updateStats();
        renderPage();
    } catch (err) {
        console.error(err);
        showToast('ເກີດຂໍ້ຜິດພາດ', 'error');
    }
}

function updateStats() {
    document.getElementById('total-products').innerText = allProducts.length;
    const lowStock = allProducts.filter(p => p.stock_qty <= p.min_stock).length;
    document.getElementById('low-stock-count').innerText = lowStock;
    const totalValue = allProducts.reduce((sum, p) => sum + (p.retail_price * p.stock_qty), 0);
    document.getElementById('total-value').innerHTML = formatLAK(totalValue);
}

function renderPage() {
    const tbody = document.getElementById('products-tbody');
    const start = (currentPage - 1) * itemsPerPage;
    const end = start + itemsPerPage;
    const pageProducts = filteredProducts.slice(start, end);
    
    if (pageProducts.length === 0) {
        tbody.innerHTML = '<tr><td colspan="7" style="text-align: center; padding: 40px;">ບໍ່ມີຂໍ້ມູນສິນຄ້າ</td></tr>';
        return;
    }
    
    tbody.innerHTML = pageProducts.map(product => {
        const status = getStockStatus(product.stock_qty, product.min_stock);
        return `
            <tr>
                <td><code>${product.barcode}</code></td>
                <td><b>${product.name}</b></td>
                <td>${product.category || '-'}</td>
                <td>${formatLAK(product.retail_price)}</td>
                <td>${product.stock_qty}</td>
                <td><span class="stock-badge ${status.class}">${status.text}</span></td>
                <td class="action-buttons">
                    <button class="edit-btn" onclick="openEditModal('${product.id}')">✏️ ແກ້ໄຂ</button>
                    <button class="delete-btn" onclick="deleteProduct('${product.id}')">🗑️ ລຶບ</button>
                </td>
            </tr>
        `;
    }).join('');
    
    // Update pagination
    totalPages = Math.ceil(filteredProducts.length / itemsPerPage);
    document.getElementById('page-info').innerHTML = `ຫນ້າ ${currentPage} / ${totalPages || 1}`;
    
    // Update button states
    document.getElementById('first-page').disabled = currentPage === 1;
    document.getElementById('prev-page').disabled = currentPage === 1;
    document.getElementById('next-page').disabled = currentPage === totalPages;
    document.getElementById('last-page').disabled = currentPage === totalPages;
}

function goToPage(page) {
    if (page < 1 || page > totalPages) return;
    currentPage = page;
    renderPage();
}

function prevPage() { goToPage(currentPage - 1); }
function nextPage() { goToPage(currentPage + 1); }

function searchProducts() {
    const keyword = document.getElementById('search-input').value.toLowerCase().trim();
    if (!keyword) {
        filteredProducts = [...allProducts];
    } else {
        filteredProducts = allProducts.filter(p => 
            p.name.toLowerCase().includes(keyword) || 
            p.barcode.includes(keyword)
        );
    }
    currentPage = 1;
    renderPage();
}

function openAddModal() {
    editingProduct = null;
    document.getElementById('modal-title').innerHTML = '➕ ເພີ່ມສິນຄ້າໃໝ່';
    document.getElementById('product-barcode').value = '';
    document.getElementById('product-name').value = '';
    document.getElementById('product-price').value = '';
    document.getElementById('product-cost').value = '';
    document.getElementById('product-stock').value = '';
    document.getElementById('product-minstock').value = '5';
    document.getElementById('product-category').value = '';
    document.getElementById('product-modal').style.display = 'flex';
}

async function openEditModal(productId) {
    const product = allProducts.find(p => p.id === productId);
    if (!product) return;
    editingProduct = product;
    document.getElementById('modal-title').innerHTML = '✏️ ແກ້ໄຂສິນຄ້າ';
    document.getElementById('product-barcode').value = product.barcode;
    document.getElementById('product-name').value = product.name;
    document.getElementById('product-price').value = product.retail_price;
    document.getElementById('product-cost').value = product.cost_price || '';
    document.getElementById('product-stock').value = product.stock_qty;
    document.getElementById('product-minstock').value = product.min_stock;
    document.getElementById('product-category').value = product.category || '';
    document.getElementById('product-modal').style.display = 'flex';
}

function closeModal() {
    document.getElementById('product-modal').style.display = 'none';
}

async function saveProduct() {
    const barcode = document.getElementById('product-barcode').value.trim();
    const name = document.getElementById('product-name').value.trim();
    const price = parseFloat(document.getElementById('product-price').value);
    const cost = parseFloat(document.getElementById('product-cost').value) || 0;
    const stock = parseInt(document.getElementById('product-stock').value);
    const minStock = parseInt(document.getElementById('product-minstock').value);
    const category = document.getElementById('product-category').value.trim();
    
    if (!barcode || !name || isNaN(price) || isNaN(stock)) {
        showToast('ກະລຸນາປ້ອນຂໍ້ມູນໃຫ້ຄົບ', 'error');
        return;
    }
    
    if (price <= 0) {
        showToast('ລາຄາຂາຍຕ້ອງຫຼາຍກວ່າ 0', 'error');
        return;
    }
    
    const productData = {
        barcode, name, category,
        retail_price: price,
        cost_price: cost,
        stock_qty: stock,
        min_stock: minStock,
        last_updated: new Date().toISOString()
    };
    
    try {
        if (editingProduct) {
            const { error } = await window.supabaseClient
                .from('pos_products')
                .update(productData)
                .eq('id', editingProduct.id);
            if (error) throw error;
            showToast('ອັບເດດສິນຄ້າສຳເລັດ', 'success');
        } else {
            const { error } = await window.supabaseClient
                .from('pos_products')
                .insert([productData]);
            if (error) {
                if (error.code === '23505') {
                    showToast(`ບາໂຄດ "${barcode}" ມີແລ້ວ`, 'error');
                } else {
                    throw error;
                }
                return;
            }
            showToast('ເພີ່ມສິນຄ້າສຳເລັດ', 'success');
        }
        closeModal();
        loadProducts();
        document.getElementById('search-input').value = '';
    } catch (err) {
        console.error(err);
        showToast('ເກີດຂໍ້ຜິດພາດ: ' + err.message, 'error');
    }
}

async function deleteProduct(productId) {
    if (!confirm('ຕ້ອງການລຶບສິນຄ້ານີ້?')) return;
    try {
        const { error } = await window.supabaseClient
            .from('pos_products')
            .delete()
            .eq('id', productId);
        if (error) throw error;
        showToast('ລຶບສິນຄ້າສຳເລັດ', 'success');
        loadProducts();
    } catch (err) {
        console.error(err);
        showToast('ລຶບບໍ່ສຳເລັດ', 'error');
    }
}

async function exportInventory() {
    try {
        const { data: products, error } = await window.supabaseClient
            .from('pos_products')
            .select('*')
            .order('name');
        
        if (error) throw error;
        
        // Prepare export data
        const exportData = products.map(p => ({
            "ບາໂຄດ": p.barcode,
            "ຊື່ສິນຄ້າ": p.name,
            "ໝວດໝູ່": p.category || '-',
            "ລາຄາຂາຍ": p.retail_price,
            "ລາຄາທຶນ": p.cost_price || 0,
            "ຄົງເຫຼືອ": p.stock_qty,
            "ຂັ້ນຕ່ຳ": p.min_stock,
            "ສະຖານະ": p.stock_qty <= 0 ? 'ໝົດສາງ' : (p.stock_qty <= p.min_stock ? 'ໃກ້ໝົດ' : 'ປົກກະຕິ'),
            "ມູນຄ່າຄົງເຫຼືອ": p.retail_price * p.stock_qty
        }));
        
        // Add summary row
        const summary = {
            "ບາໂຄດ": "ສະຫຼຸບ",
            "ຊື່ສິນຄ້າ": `ລວມ ${products.length} ລາຍການ`,
            "ໝວດໝູ່": "",
            "ລາຄາຂາຍ": "",
            "ລາຄາທຶນ": "",
            "ຄົງເຫຼືອ": products.reduce((sum, p) => sum + p.stock_qty, 0),
            "ຂັ້ນຕ່ຳ": "",
            "ສະຖານະ": "",
            "ມູນຄ່າຄົງເຫຼືອ": products.reduce((sum, p) => sum + (p.retail_price * p.stock_qty), 0)
        };
        exportData.push(summary);
        
        const ws = XLSX.utils.json_to_sheet(exportData);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "ສິນຄ້າຄົງເຫຼືອ");
        
        const filename = `Inventory_Report_${new Date().toISOString().split('T')[0]}.xlsx`;
        XLSX.writeFile(wb, filename);
        
        showToast(`ສົ່ງອອກສິນຄ້າ ${products.length} ລາຍການສຳເລັດ`, 'success');
        
    } catch (err) {
        console.error(err);
        showToast('ເກີດຂໍ້ຜິດພາດສົ່ງອອກ', 'error');
    }
}

document.getElementById('search-input').addEventListener('keypress', (e) => {
    if (e.key === 'Enter') searchProducts();
});

function init() {
    if (!checkAuth()) return;
    const user = getCurrentUser();
    if (user.role !== 'GM') {
        window.location.href = 'pos-checkout.html';
        return;
    }
    displayUserName();
    loadProducts();
}

async function bulkPriceUpdate() {
    document.getElementById('bulk-price-modal').style.display = 'flex';
}

function closeBulkModal() {
    document.getElementById('bulk-price-modal').style.display = 'none';
}

async function applyBulkPriceUpdate() {
    const category = document.getElementById('bulk-category').value;
    const type = document.getElementById('bulk-type').value;
    const action = document.getElementById('bulk-action').value;
    const value = parseFloat(document.getElementById('bulk-value').value);
    
    if (isNaN(value)) {
        showToast('ກະລຸນາປ້ອນຈຳນວນ', 'error');
        return;
    }
    
    if (!confirm(`ຢືນຢັນການອັບເດດລາຄາ?`)) return;
    
    try {
        // Get products to update
        let query = window.supabaseClient.from('pos_products').select('*');
        if (category) {
            query = query.eq('category', category);
        }
        
        const { data: products } = await query;
        
        if (!products || products.length === 0) {
            showToast('ບໍ່ມີສິນຄ້າໃນໝວດນີ້', 'warning');
            return;
        }
        
        let updatedCount = 0;
        
        for (const product of products) {
            let newPrice = product.retail_price;
            
            if (type === 'percent') {
                const percentChange = value / 100;
                if (action === 'increase') {
                    newPrice = product.retail_price * (1 + percentChange);
                } else {
                    newPrice = product.retail_price * (1 - percentChange);
                }
            } else if (type === 'fixed') {
                if (action === 'increase') {
                    newPrice = product.retail_price + value;
                } else {
                    newPrice = product.retail_price - value;
                }
            } else if (type === 'set') {
                newPrice = value;
            }
            
            // Ensure price isn't negative
            newPrice = Math.max(0, Math.round(newPrice));
            
            if (newPrice !== product.retail_price) {
                await window.supabaseClient
                    .from('pos_products')
                    .update({ retail_price: newPrice, last_updated: new Date().toISOString() })
                    .eq('id', product.id);
                updatedCount++;
            }
        }
        
        showToast(`ອັບເດດລາຄາ ${updatedCount} ລາຍການສຳເລັດ`, 'success');
        closeBulkModal();
        loadProducts(); // Refresh the list
        
    } catch (err) {
        console.error(err);
        showToast('ເກີດຂໍ້ຜິດພາດ: ' + err.message, 'error');
    }
}
    
init();
</script>
