<!DOCTYPE html>
<html lang="lo">
<head>
    <meta charset="UTF-8">
    <title>LSM POS | ໜ້າຈໍສະແດງລູກຄ້າ</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Phetsarath&family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #10b981;
            --primary-dark: #059669;
            --bg: #f1f5f9;
            --dark-bg: #0f172a;
            --text-dark: #1e293b;
            --text-light: #64748b;
            --lao: 'Phetsarath', sans-serif;
        }
        body {
            margin: 0;
            background: var(--bg);
            font-family: 'Plus Jakarta Sans', var(--lao);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }
        .order-details {
            flex: 1;
            padding: 40px;
            display: flex;
            flex-direction: column;
            background: white;
        }
        .order-details h1 { margin: 0; font-size: 28px; color: var(--text-dark); }
        .item-list { flex: 1; overflow-y: auto; margin-top: 20px; }
        .item-row {
            display: flex;
            justify-content: space-between;
            padding: 15px 0;
            border-bottom: 1px solid #f1f5f9;
            font-size: 18px;
        }
        .waiting-box {
            text-align: center;
            padding: 50px;
            color: var(--text-light);
            font-size: 18px;
        }
        .total-section {
            border-top: 2px solid #eee;
            padding-top: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .total-label { font-size: 24px; font-weight: 700; color: var(--text-dark); }
        .total-amount { font-size: 36px; font-weight: 800; color: var(--primary-dark); }
        .payment-side {
            width: 450px;
            background: var(--dark-bg);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
            text-align: center;
        }
        #amount { font-size: 48px; font-weight: 800; color: var(--primary); margin-bottom: 20px; }
        #qrcode-canvas {
            background: white;
            padding: 15px;
            border-radius: 20px;
            min-height: 230px;
            width: 230px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 10px 0;
        }
        .payment-status { margin-top: 20px; font-size: 14px; color: #94a3b8; }
        .thank-you {
            font-size: 32px;
            color: var(--primary);
            font-weight: 800;
            display: none;
        }
        .thank-you span { font-size: 20px; color: white; display: block; margin-top: 10px; }
        .footer { margin-top: 30px; font-size: 13px; color: #3aba5e; opacity: 0.7; text-align: center; }
        .thank-you-service {
    margin-top: 8px;
    font-size: 16px;  /* Make this bigger */
    font-weight: 600;  /* Make it bold */
    color: white; 
    </style>
</head>
<body>

<div class="order-details">
    <div class="welcome-message">🌸 ລະບົບຂາຍອັດສະລິຍະ mPOS ຍິນດີຕ້ອນຮັບ 🌸</div>
    <h1>🛍️ ລາຍການສິນຄ້າຂອງທ່ານ</h1>
    <div class="item-list" id="item-list">
        <div class="waiting-box">⏳ ລໍຖ້າລາຍການສິນຄ້າ...</div>
    </div>
    <div class="total-section">
        <span class="total-label">ຍອດລວມທັງໝົດ:</span>
        <span class="total-amount" id="total-display">₭0</span>
    </div>
</div>

<div class="payment-side">
    <div id="payment-content">
        <div id="amount">₭0</div>
        <div id="qrcode-canvas"><div style="color:#0f172a;">⏳ ກຳລັງລໍຖ້າ...</div></div>
        <p class="payment-status" id="payment-status-text">ກະລຸນາລໍຖ້າການເລືອກວິທີຊຳລະ</p>
    </div>
    <div id="thank-you-msg" class="thank-you">
        🙏 ຂໍຂອບໃຈ!<span>ຊຳລະເງິນສຳເລັດແລ້ວ</span>
    </div>
     <div class="footer">
        ⚡ mPOS ລະບົບຂາຍອັດສະລິຍະ<br>
        ພັດທະນາໂດຍ: ສົມພອນ 02055348882
        <div class="thank-you-service.">🙏 ຂອບໃຈທີ່ໃຊ້ບໍລິການ | Thanks for choosing us.</div>
    </div>
</div>

<script>
// Supabase configuration
const SUPABASE_URL = "https://rcjvgyetkukyaexzskmg.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJjanZneWV0a3VreWFleHpza21nIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc4NzQ2MzUsImV4cCI6MjA5MzQ1MDYzNX0.aNTyK0l1sOYpZ0TdGrmjxIQbafnujQb1hP6dENX_104";
const TERMINAL_ID = "main-terminal";

const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

function formatCurrency(amount) {
    if (!amount || isNaN(amount)) return '₭0';
    return new Intl.NumberFormat('lo-LA').format(Math.round(amount)) + ' ₭';
}

function updateUI(data) {
    console.log('🔄 Updating UI with data:', data);
    
    document.getElementById('payment-content').style.display = 'block';
    document.getElementById('thank-you-msg').style.display = 'none';
    
    const amountValue = Number(data.amount) || 0;
    document.getElementById('amount').innerText = formatCurrency(amountValue);
    document.getElementById('total-display').innerText = formatCurrency(amountValue);
    
    const listContainer = document.getElementById('item-list');
    if (data.items && data.items.length > 0) {
        listContainer.innerHTML = data.items.map(item => `
            <div class="item-row">
                <span>${item.name} x ${item.qty}</span>
                <span>${formatCurrency(item.retail_price * item.qty)}</span>
            </div>
        `).join('');
    } else {
        listContainer.innerHTML = '<div class="waiting-box">🛍️ ກຳລັງເພີ່ມສິນຄ້າ...</div>';
    }
    
    const qrContainer = document.getElementById("qrcode-canvas");
    const statusText = document.getElementById('payment-status-text');
    qrContainer.innerHTML = "";
    
    if (data.qr_string && data.qr_string.length > 10) {
        try {
            new QRCode(qrContainer, { text: data.qr_string, width: 200, height: 200 });
            statusText.innerText = "📱 ສະແກນ QR ເພື່ອຊຳລະເງິນ";
        } catch(e) {
            console.error('QR Error:', e);
        }
    } else if (amountValue > 0) {
        qrContainer.innerHTML = '<div style="font-size: 70px;">💵</div>';
        statusText.innerText = "💵 ຊຳລະເງິນສົດທີ່ເຄົາເຕີ";
    } else {
        qrContainer.innerHTML = '<div style="color:#0f172a;">⏳ ກຳລັງລໍຖ້າ...</div>';
        statusText.innerText = "ກະລຸນາລໍຖ້າ...";
    }
}

function showThankYou() {
    document.getElementById('payment-content').style.display = 'none';
    document.getElementById('thank-you-msg').style.display = 'block';
    setTimeout(() => {
        document.getElementById('payment-content').style.display = 'block';
        document.getElementById('thank-you-msg').style.display = 'none';
    }, 8000);
}

// Start real-time subscription with simpler approach
async function startRealtimeSubscription() {
    console.log('🔄 Starting real-time subscription...');
    
    // First, get initial data
    const { data: initialData } = await _supabase
        .from('pos_customer_display')
        .select('*')
        .eq('id', TERMINAL_ID)
        .maybeSingle();
    
    if (initialData && initialData.status !== 'PAID') {
        updateUI(initialData);
    }
    
    // Subscribe to changes
    const channel = _supabase
        .channel('public:pos_customer_display')
        .on('postgres_changes', {
            event: 'UPDATE',
            schema: 'public',
            table: 'pos_customer_display',
            filter: `id=eq.${TERMINAL_ID}`
        }, (payload) => {
            console.log('📡 UPDATE received:', payload);
            const data = payload.new;
            if (data.status === 'PAID') {
                showThankYou();
            } else {
                updateUI(data);
            }
        })
        .on('postgres_changes', {
            event: 'INSERT',
            schema: 'public',
            table: 'pos_customer_display',
            filter: `id=eq.${TERMINAL_ID}`
        }, (payload) => {
            console.log('📡 INSERT received:', payload);
            const data = payload.new;
            updateUI(data);
        })
        .subscribe((status) => {
            console.log('📡 Subscription status:', status);
            if (status === 'SUBSCRIBED') {
                console.log('✅ Real-time connected!');
            }
        });
    
    return channel;
}

// Also poll as fallback (every 2 seconds)
let pollInterval = null;

function startPolling() {
    if (pollInterval) clearInterval(pollInterval);
    
    pollInterval = setInterval(async () => {
        try {
            const { data } = await _supabase
                .from('pos_customer_display')
                .select('*')
                .eq('id', TERMINAL_ID)
                .maybeSingle();
            
            if (data && data.status !== 'PAID') {
                // Only update if something changed (avoid flicker)
                const currentAmount = document.getElementById('amount').innerText;
                const newAmount = formatCurrency(data.amount);
                if (currentAmount !== newAmount) {
                    updateUI(data);
                }
            } else if (data && data.status === 'PAID') {
                showThankYou();
            }
        } catch (err) {
            console.error('Poll error:', err);
        }
    }, 2000);
}

// Start everything
async function init() {
    await startRealtimeSubscription();
    startPolling(); // Fallback in case realtime fails
}

init();
</script>
</body>
</html>
